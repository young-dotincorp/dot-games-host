<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>로보 77 — Dot Games</title>
<style>
  :root{
    --bg:#14171C; --panel:#1C2128; --panel-2:#222831; --line:#2E343D;
    --ink:#E8EAED; --muted:#9AA0A8;
    --pin-off:#2C323B; --pin-on:#F2C14E; --pin-danger:#E5484D;
    --accent:#F2C14E; --danger:#E5484D; --good:#3DD68C;
    --p1:#F2C14E; --p2:#6E8EFB; --turn:#F2C14E;
    --turn-glow:rgba(242,193,78,.45); --turn-tint:rgba(242,193,78,.10);
    --tile:#F7F3EA; --tile-ink:#1A1A1A; --tile-line:#E2DBCB;
    --r:14px; --r-sm:10px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .wrap{height:100dvh; display:flex; flex-direction:column; max-width:1100px; margin:0 auto; padding:14px clamp(12px,3vw,28px);}
  /* ---- header / footer : 임베드 모드에서 숨김 (embed spec §1) ---- */
  header{display:flex; align-items:baseline; gap:12px; flex:none; padding-bottom:10px;}
  header h1{margin:0; font-size:20px; letter-spacing:-.01em;}
  header h1 b{color:var(--accent);}
  header .sub{color:var(--muted); font-size:13px;}
  footer{flex:none; color:var(--muted); font-size:12px; text-align:center; padding-top:8px;}
  body.embed header, body.embed footer{display:none;}

  main{flex:1 1 auto; display:flex; flex-direction:column; gap:14px; min-height:0;}

  /* ---- 닷패드 디스플레이 (주인공) ---- */
  .pad{
    flex:1 1 auto; min-height:0; position:relative; background:linear-gradient(180deg,#1F252E 0%,#191D24 100%);
    border:1px solid var(--line); border-radius:var(--r); padding:14px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    display:flex; flex-direction:column; gap:10px;
  }
  .pad-top{display:flex; justify-content:space-between; align-items:center; gap:12px; flex:none;}
  .seat{display:flex; align-items:center; gap:8px;}
  .seat .who{font-size:13px; color:var(--muted);}
  .seat.turn .who{color:var(--turn); font-weight:700;}
  .chips{display:inline-flex; gap:5px;}
  .chip{width:13px; height:13px; border-radius:50%; background:var(--pin-on); box-shadow:0 0 0 1px rgba(0,0,0,.25) inset;}
  .chip.out{background:var(--pin-off); box-shadow:none;}
  .turn-dot{width:8px;height:8px;border-radius:50%;background:var(--turn); opacity:0; transition:opacity .2s;}
  .seat.turn .turn-dot{opacity:1; animation:blink 1s steps(2,start) infinite;}
  @keyframes blink{50%{opacity:.25;}}
  canvas#pad{flex:1 1 auto; width:100%; min-height:0; display:block; image-rendering:pixelated;}
  .pad-cap{flex:none; display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted);}
  .pad-cap .total{font-variant-numeric:tabular-nums;}
  .pad-cap .total b{color:var(--ink); font-size:15px;}
  .pad.warn{border-color:var(--danger); box-shadow:0 0 0 1px var(--danger) inset;}
  .pad.warn .pad-cap .total b{color:var(--danger);}

  /* ---- 상태/음성 안내 줄 ---- */
  .status{flex:none; min-height:22px; font-size:14px; color:var(--ink); text-align:center; line-height:1.4;}
  .status.bad{color:var(--danger); font-weight:700;}
  .status.good{color:var(--good); font-weight:700;}

  /* ---- 손패 (숫자 카드 모티프) ---- */
  .hand-wrap{flex:none;}
  .hand-label{font-size:12px; color:var(--muted); margin:0 2px 6px; display:flex; justify-content:space-between;}
  .hand{display:flex; gap:8px; justify-content:center; align-items:stretch;}
  .card{
    position:relative; flex:1 1 0; max-width:96px; aspect-ratio:3/4; min-width:0;
    background:linear-gradient(158deg,#FCFAF4 0%,#F1EADB 100%); color:var(--tile-ink);
    border:1px solid rgba(120,100,60,.16); border-radius:13px; cursor:pointer;
    transition:transform .16s cubic-bezier(.2,.8,.25,1), box-shadow .18s, background .2s;
    display:flex; align-items:center; justify-content:center; outline:0; padding:6px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.75), 0 1px 2px rgba(0,0,0,.18), 0 5px 12px rgba(0,0,0,.22);
  }
  .card .v{font-size:clamp(20px,6vw,34px); font-weight:800; letter-spacing:-.02em; line-height:1; text-shadow:0 1px 0 rgba(255,255,255,.55);}
  .card .corner{position:absolute; font-size:11px; font-weight:700; opacity:.6;}
  .card .corner.tl{top:6px; left:7px;} .card .corner.br{bottom:6px; right:7px;}
  .card.sel{transform:translateY(-10px) scale(1.03); box-shadow:0 0 0 2px var(--turn), 0 0 16px var(--turn-glow), inset 0 1px 0 rgba(255,255,255,.75), 0 12px 26px rgba(0,0,0,.42);}
  /* 2인 모드: 현재 플레이어 색의 고급 손패 패널 */
  body.twop .hand-wrap{ background:var(--turn-tint); border:1px solid rgba(255,255,255,.05); border-top:2px solid var(--turn); border-radius:12px; padding:10px 10px 6px; box-shadow:0 0 22px -10px var(--turn-glow); transition:background .28s, border-color .28s, box-shadow .28s; }
  body.twop #hand-owner{ display:inline-block; padding:2px 11px; border-radius:999px; background:var(--turn-tint); border:1px solid var(--turn); font-weight:700; font-size:11px; letter-spacing:.01em; }
  .card .kind{font-size:11px; font-weight:700; opacity:.55; position:absolute; bottom:7px; left:0; right:0; text-align:center;}
  .card.set{background:linear-gradient(158deg,#EEF3FC,#DCE6F7);} .card.mul2{background:linear-gradient(158deg,#F4EEFB,#E6DAF4);} .card.sub10{background:linear-gradient(158deg,#FCF1EA,#F6E2D3);} .card.rev{background:linear-gradient(158deg,#EBF7F0,#D8F0E2);}

  /* ---- 컨트롤 ---- */
  .controls{flex:none; display:flex; gap:8px; align-items:stretch;}
  .btn{
    flex:1 1 0; border:1px solid var(--line); background:var(--panel-2); color:var(--ink);
    font:inherit; font-weight:600; font-size:14px; padding:13px 10px; border-radius:var(--r-sm);
    cursor:pointer; display:inline-flex; gap:7px; align-items:center; justify-content:center;
    transition:background .12s, border-color .12s, transform .06s; touch-action:manipulation;
  }
  .btn:hover{border-color:#3a424d;}
  .btn:active{transform:translateY(1px);}
  .btn:focus-visible{outline:3px solid var(--accent); outline-offset:2px;}
  .btn.primary{background:var(--accent); color:#1a1500; border-color:var(--accent);}
  .btn.primary:disabled{opacity:.4; cursor:not-allowed;}
  .btn .nav-arrow{font-size:30px; font-weight:700; line-height:1;}
  .btn.icon{flex:0 0 auto; min-width:54px;}
  /* Tabler 아이콘 (stroke 방식) */
  .btn svg{width:23px; height:23px; display:block;}
  .btn#pad-btn.on{color:var(--good); border-color:var(--good);}
  /* 임베드 모드: 상단 닫기를 부모(Tactile World)가 제공 → 게임 내 닫기 버튼 숨김 */
  body.embed #exit{display:none;}

  /* ---- 오버레이 (라운드/게임 결과) ---- */
  .ovl{position:fixed; inset:0; background:rgba(10,12,15,.82); display:flex; align-items:center; justify-content:center; padding:24px; z-index:20;}
  .ovl[hidden]{display:none;}
  .ovl .box{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:28px 26px; max-width:380px; width:100%; text-align:center;}
  .ovl h2{margin:0 0 8px; font-size:24px;}
  .ovl p{margin:0 0 20px; color:var(--muted); font-size:14px; line-height:1.55;}
  .ovl .box .btn{width:100%;}
  .ovl .box .btn + .btn{margin-top:10px;}
  .sr{position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0;}

  @media (max-width:560px){
    .wrap{padding:10px 12px;}
    .card{max-width:none;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>로보 <b>77</b></h1>
    <span class="sub">누적 77 미만 지키기 · 닷패드 촉각 카드 게임</span>
  </header>

  <main>
    <!-- 닷패드 디스플레이: 누적 점수(큰 핀 숫자) + 생명 칩 + 턴 -->
    <section class="pad" id="pad-panel" aria-label="닷패드 화면">
      <div class="pad-top">
        <div class="seat" id="seat-you"><span class="turn-dot"></span><span class="who">나</span><span class="chips" id="chips-you" aria-label="내 생명"></span></div>
        <div class="seat" id="seat-ai"><span class="chips" id="chips-ai" aria-label="상대 생명"></span><span class="who">AI</span><span class="turn-dot"></span></div>
      </div>
      <canvas id="pad" width="600" height="320" role="img" aria-label="누적 점수 화면"></canvas>
      <div class="pad-cap">
        <span>누적 점수</span>
        <span class="total"><b id="total-num">0</b> / 77</span>
      </div>
    </section>

    <!-- 음성/상태 안내 (스크린리더 라이브) -->
    <p class="status" id="status" aria-live="polite">게임을 시작합니다.</p>

    <!-- 손패 -->
    <div class="hand-wrap">
      <div class="hand-label"><span id="hand-owner">내 손패</span><span id="hand-hint">← → 카드 고르기 · Enter 내기</span></div>
      <div class="hand" id="hand" role="listbox" aria-label="내 손패"></div>
    </div>

    <!-- 컨트롤 -->
    <div class="controls">
      <button class="btn icon" id="prev" aria-label="이전 카드"><span class="nav-arrow">‹</span></button>
      <button class="btn primary" id="play" aria-label="고른 카드 내기">카드 내기</button>
      <button class="btn icon" id="next" aria-label="다음 카드"><span class="nav-arrow">›</span></button>
      <button class="btn icon" id="speak" aria-label="현재 상황 읽어주기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 8a5 5 0 0 1 0 8" /><path d="M17.7 5a9 9 0 0 1 0 14" /><path d="M6 15h-2a1 1 0 0 1 -1 -1v-4a1 1 0 0 1 1 -1h2l3.5 -4.5a.8 .8 0 0 1 1.5 .5v14a.8 .8 0 0 1 -1.5 .5l-3.5 -4.5" /></svg></button>
      <button class="btn icon" id="pad-btn" aria-label="닷패드 연결"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 8l10 8l-5 4l0 -16l5 4l-10 8" /></svg></button>
      <button class="btn icon" id="exit" aria-label="나가기">✕</button>
    </div>
  </main>

  <footer>←→ 카드 이동 · F1·Enter 내기 · F2 고른 카드 · F3 누적 점수 · F4 전체 듣기 · 닷패드 키 동일</footer>
</div>

<!-- 라운드/게임 결과 오버레이 -->
<div class="ovl" id="ovl" hidden>
  <div class="box">
    <h2 id="ovl-title">라운드 종료</h2>
    <p id="ovl-msg"></p>
    <button class="btn primary" id="ovl-btn">계속</button>
  </div>
</div>

<!-- 시작 메뉴: 대결 방식 선택 -->
<div class="ovl" id="menu" hidden>
  <div class="box">
    <h2>로보 77</h2>
    <p>대결 방식을 골라주세요.</p>
    <button class="btn primary" id="m-easy">AI와 대결 · 쉬움</button>
    <button class="btn" id="m-hard">AI와 대결 · 어려움</button>
    <button class="btn" id="m-2p">둘이서 · 사람 vs 사람</button>
  </div>
</div>

<div class="sr" aria-live="assertive" id="sr-live"></div>

<script>
"use strict";
/* =====================================================================
   로보 77 — 단일 파일 임베드 게임 (싱글: 나 vs AI, 2인)
   - 외부 의존성 0. 닷게임즈 임베드 규격(embed=1 / preview=0 / postMessage) 준수.
   - ★규칙·덱은 아래 RULES/DECK 설정값으로 분리 → 기획 문서에 맞춰 쉽게 조정.
   ===================================================================== */

/* ---------- ① 규칙 설정 (기획 문서에 맞춰 여기만 고치면 됨) ---------- */
const RULES = {
  limit: 77,          // 누적이 이 값 이상이면 칩 1개 잃고 라운드 리셋
  chips: 3,           // 플레이어당 생명 칩
  handSize: 5,        // 손패 장수
  revMode: "again",   // 2인에서 방향전환 카드: 같은 사람 한 번 더
};
// 덱 구성: add=더하기, set=그 수로 고정, mul2=2배, sub10=10 빼기(0 미만 0), rev=방향전환
const DECK_SPEC = [
  ["add",1,6],["add",2,6],["add",3,5],["add",4,5],["add",5,4],["add",10,4],["add",0,3],
  ["set",11,1],["set",22,1],["set",33,1],["set",44,1],["set",55,1],["set",66,1],["set",76,1],
  ["mul2",0,4],["sub10",0,4],["rev",0,4],
];

/* ---------- ② 카드 표시 라벨 ---------- */
function cardFace(c){
  if(c.t==="add") return { v:(c.v>0?"+"+c.v:String(c.v)), kind:"더하기", cls:"" };
  if(c.t==="set") return { v:String(c.v), kind:"고정", cls:"set" };
  if(c.t==="mul2") return { v:"×2", kind:"두 배", cls:"mul2" };
  if(c.t==="sub10") return { v:"−10", kind:"빼기", cls:"sub10" };
  if(c.t==="rev") return { v:"↺", kind:"방향", cls:"rev" };
  return { v:"?", kind:"", cls:"" };
}
function cardSpeak(c){
  if(c.t==="add") return (c.v>=0?c.v+" 더하기":"마이너스 "+(-c.v));
  if(c.t==="set") return c.v+"으로 고정";
  if(c.t==="mul2") return "두 배 카드";
  if(c.t==="sub10") return "10 빼기 카드";
  if(c.t==="rev") return "방향 전환 카드";
  return "";
}

/* ---------- ③ 덱 / 셔플 ---------- */
function buildDeck(){
  const d=[]; let id=0;
  for(const [t,v,n] of DECK_SPEC) for(let i=0;i<n;i++) d.push({t,v,id:id++});
  return d;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ---------- ④ 게임 상태 ---------- */
const G = {
  deck:[], total:0, turn:0, sel:0, over:false, busy:false,
  players:[ {name:"나",  chips:RULES.chips, hand:[], ai:false},
            {name:"AI", chips:RULES.chips, hand:[], ai:true } ],
};
function draw(){ if(!G.deck.length) G.deck=shuffle(buildDeck()); return G.deck.pop(); }
function refill(p){ while(p.hand.length<RULES.handSize) p.hand.push(draw()); }

function configurePlayers(mode){
  if(mode==="2p"){
    G.players=[{name:"플레이어 1",chips:RULES.chips,hand:[],ai:false},
               {name:"플레이어 2",chips:RULES.chips,hand:[],ai:false}];
    G.aiHard=false;
  } else {
    G.players=[{name:"나",chips:RULES.chips,hand:[],ai:false},
               {name:"AI",chips:RULES.chips,hand:[],ai:true}];
    G.aiHard=(mode==="hard");
  }
}
function startGame(mode){
  G.mode=mode; configurePlayers(mode);
  document.body.classList.toggle("twop", mode==="2p");
  G.deck=shuffle(buildDeck()); G.total=0; G.turn=0; G.sel=0; G.over=false; G.busy=false;
  for(const p of G.players){ p.chips=RULES.chips; p.hand=[]; refill(p); }
  hideMenu(); hideOvl(); render();
  const intro = (mode==="2p")
    ? `둘이서 대결을 시작합니다. 누적 77 미만을 지키세요. ${G.players[0].name} 차례입니다.`
    : `게임 시작. 누적 77 미만을 지키세요. 내 차례입니다.`;
  say(intro, {assertive:true, interrupt:true});
}
// 시작/재시작 진입점 → 대결 방식 선택 메뉴
function newGame(){ showMenu(); }
function showMenu(){
  G.over=true; G.busy=true; silence();
  hideOvl(); const m=document.getElementById("menu"); if(m) m.hidden=false;
  const b=document.getElementById("m-easy"); if(b) b.focus();
  say("로보 77. 대결 방식을 골라주세요. AI와 대결 쉬움, AI와 대결 어려움, 또는 사람끼리 둘이서.", {assertive:true, interrupt:true});
}
function hideMenu(){ const m=document.getElementById("menu"); if(m) m.hidden=true; }

/* ---------- ⑤ 규칙 엔진: 카드 적용 ---------- */
function applyCard(c, total){
  if(c.t==="add")   return Math.max(0, total + c.v);
  if(c.t==="set")   return c.v;
  if(c.t==="mul2")  return total * 2;
  if(c.t==="sub10") return Math.max(0, total - 10);
  if(c.t==="rev")   return total;   // 누적 변화 없음
  return total;
}

/* ---------- ⑥ 한 수 두기 ---------- */
function playCard(pIdx, handIdx){
  if(G.over || G.busy) return;
  const p=G.players[pIdx]; const c=p.hand[handIdx];
  if(!c) return;
  p.hand.splice(handIdx,1);
  const before=G.total; const after=applyCard(c, before);
  G.total=after;

  const human = !p.ai;
  const faceWord = cardSpeak(c);

  // 방향전환(2인: 같은 사람 한 번 더)
  let extraTurn = (c.t==="rev" && RULES.revMode==="again");

  if(after>=RULES.limit){
    // 버스트 → 칩 잃고 라운드 리셋
    p.chips--; G.total=0; extraTurn=false;
    render();
    const msg = `${p.name} 카드 ${faceWord}. 누적 ${after} — 77 넘김! ${p.name} 생명 하나 잃음.`;
    if(p.chips<=0){ refill(p); finishGame(pIdx); return; }
    refill(p);
    narrate(msg, "bad", ()=>endTurn(pIdx, false));
    return;
  }

  refill(p);
  render();
  const msg = `${p.name} 카드 ${faceWord}. 누적 ${after}.` + (extraTurn? " 방향 전환, 한 번 더." : "");
  narrate(msg, "", ()=>endTurn(pIdx, extraTurn));
}

function endTurn(pIdx, extraTurn){
  if(G.over) return;
  const next = extraTurn ? pIdx : (pIdx+1)%G.players.length;
  G.turn=next; G.sel=0; render();
  if(G.players[next].ai){
    G.busy=true; // AI 차례 안내가 끝나면 카드를 냄
    narrate(`AI 차례입니다. 현재 누적 ${G.total}.`, "", ()=>aiMove(next));
  } else {
    G.busy=false;
    const nm=G.players[next].name;
    const label=(nm==="나")?"내 차례입니다":`${nm} 차례입니다`;
    narrate(`${label}. 현재 누적 ${G.total}.`, "");
  }
}

/* ---------- ⑦ AI (안전 우선 휴리스틱) ---------- */
function aiPick(p){
  let safe=[], any=[];
  p.hand.forEach((c,i)=>{
    const after=applyCard(c, G.total);
    any.push({i,after});
    if(after<RULES.limit) safe.push({i,after});
  });
  if(!safe.length){ any.sort((a,b)=>a.after-b.after); return any[0].i; } // 다 버스트면 피해 최소
  if(G.aiHard){
    // 어려움: 버스트 안 나는 선에서 누적을 최대로(압박) — 강한 AI
    safe.sort((a,b)=>b.after-a.after); return safe[0].i;
  }
  // 쉬움: 종종 약하게 둠 — 가장 안전(낮은)한 카드를 자주 내거나 무작위로 골라 빈틈을 줌
  if(Math.random()<0.45){ safe.sort((a,b)=>a.after-b.after); return safe[0].i; }
  return safe[Math.floor(Math.random()*safe.length)].i;
}
function aiMove(idx){
  if(G.over) return;
  const p=G.players[idx]; if(!p || !p.ai){ G.busy=false; return; }
  setTimeout(()=>{ if(G.over) return; G.busy=false; playCard(idx, aiPick(p)); }, AI_PAUSE);
}

   렌더링 — 닷패드 핀 그리드 + 손패 + 칩/턴
   ===================================================================== */
const cvs=document.getElementById("pad"), cx=cvs.getContext("2d");
// 5×7 도트 폰트 (숫자)
const FONT={
 "0":["01110","10001","10011","10101","11001","10001","01110"],
 "1":["00100","01100","00100","00100","00100","00100","01110"],
 "2":["01110","10001","00001","00010","00100","01000","11111"],
 "3":["11111","00010","00100","00010","00001","10001","01110"],
 "4":["00010","00110","01010","10010","11111","00010","00010"],
 "5":["11111","10000","11110","00001","00001","10001","01110"],
 "6":["00110","01000","10000","11110","10001","10001","01110"],
 "7":["11111","00001","00010","00100","01000","01000","01000"],
 "8":["01110","10001","10001","01110","10001","10001","01110"],
 "9":["01110","10001","10001","01111","00001","00010","01100"],
};
// 숫자를 핀 그리드(W×H)에 자동 스케일·중앙 배치로 찍기 (1=올림, 2=경고)
function stampNumber(grid, num, W, H){
  const s=String(num), warn=num>=66, digits=s.length;
  const baseW=digits*6-1, baseH=7;
  const scale=Math.max(1, Math.min(Math.floor((H-1)/baseH), Math.floor((W-1)/baseW)));
  const ox=Math.floor((W-baseW*scale)/2), oy=Math.floor((H-baseH*scale)/2);
  for(let k=0;k<digits;k++){ const pat=FONT[s[k]]||FONT["0"];
    for(let yy=0;yy<7;yy++) for(let xx=0;xx<5;xx++) if(pat[yy][xx]==="1")
      for(let sy=0;sy<scale;sy++) for(let sx=0;sx<scale;sx++){
        const X=ox+(k*6+xx)*scale+sx, Y=oy+yy*scale+sy;
        if(grid[Y]&&grid[Y][X]!=null) grid[Y][X]=warn?2:1;
      }
  }
}
function buildGridScaled(W,H){ const g=[]; for(let y=0;y<H;y++){ g[y]=[]; for(let x=0;x<W;x++) g[y][x]=0; } stampNumber(g,G.total,W,H); return g; }
function drawPad(){
  const warn = G.total>=66; // 77 근접 경고
  document.getElementById("pad-panel").classList.toggle("warn", warn);
  const COLS=40, ROWS=22, W=cvs.clientWidth||cvs.width, H=cvs.clientHeight||cvs.height;
  cvs.width=W; cvs.height=H;
  const gx=W/COLS, gy=H/ROWS, r=Math.max(1.5, Math.min(gx,gy)*0.34);
  cx.clearRect(0,0,W,H);
  const grid=buildGridScaled(COLS,ROWS);
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const on=grid[y][x];
    cx.beginPath(); cx.arc(x*gx+gx/2, y*gy+gy/2, r, 0, Math.PI*2);
    cx.fillStyle = on===2? getCss("--pin-danger") : on===1? getCss("--pin-on") : getCss("--pin-off");
    cx.fill();
  }
}
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

let lastMsg="";
function flash(msg, cls){ const s=document.getElementById("status"); s.className="status"+(cls?(" "+cls):""); s.textContent=msg; lastMsg=msg; say(msg); }
function setStatus(msg){ const s=document.getElementById("status"); s.className="status"; s.textContent=msg; lastMsg=msg; }
// 사용 가능한 한국어 음성 중 가장 자연스러운(신경망) 음성 자동 선택
let bestVoice=null;
function pickVoice(){
  if(!window.speechSynthesis) return;
  const all=speechSynthesis.getVoices()||[];
  const ko=all.filter(v=>/ko(-|_)?KR/i.test(v.lang)||/korean|한국/i.test(v.name));
  const prefer=[/Heami/i,/SunHi/i,/InJoon/i,/Yuna/i,/Google.*(한국|korea)/i,/Microsoft.*(Neural|Online|Natural)/i,/Natural/i,/Neural/i,/Premium|Enhanced/i];
  for(const re of prefer){ const m=ko.find(v=>re.test(v.name)); if(m){ bestVoice=m; return; } }
  bestVoice = ko[0] || null;
}
if(window.speechSynthesis){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
/* 음성 페이싱 설정 (조절 가능)
   TTS_RATE: 음성 속도(1.0=기본, 낮추면 더 천천히) · AI_PAUSE: AI가 말 끝낸 뒤 카드 낼 때까지 텀(ms) */
const TTS_RATE=1.0, AI_PAUSE=550;
let speakSafetyTimer=null;
function say(text, opts){
  if(opts===true || opts===false) opts={assertive:opts};
  opts=opts||{};
  if(opts.assertive){ const sr=document.getElementById("sr-live"); if(sr) sr.textContent=text; }
  const done = (typeof opts.onDone==="function") ? opts.onDone : null;
  try{
    if(window.speechSynthesis){
      if(!bestVoice) pickVoice();
      const u=new SpeechSynthesisUtterance(text);
      if(bestVoice) u.voice=bestVoice;
      u.lang="ko-KR"; u.rate=TTS_RATE; u.pitch=1.06; u.volume=1.0;
      let fired=false;
      const fin=()=>{ if(fired)return; fired=true; clearTimeout(speakSafetyTimer); if(done) done(); };
      u.onend=fin; u.onerror=fin;
      if(opts.interrupt) window.speechSynthesis.cancel(); // 수동 읽기·카드 이동만 즉시 끊기
      window.speechSynthesis.speak(u);
      // 안전망: onend를 누락하는 일부 브라우저 대비 (음성은 보통 이보다 먼저 끝남)
      if(done){ clearTimeout(speakSafetyTimer); speakSafetyTimer=setTimeout(fin, 8000); }
      return;
    }
  }catch(e){}
  // 음성 불가 → 화면 글자를 읽을 시간을 확보한 뒤 진행
  if(done) setTimeout(done, Math.min(4500, 1500 + (text?text.length:0)*120));
}
/* 게임 진행용: 상태 표시 + 음성, 음성이 끝나면 then() 실행 */
function narrate(msg, cls, then){
  const s=document.getElementById("status"); s.className="status"+(cls?(" "+cls):""); s.textContent=msg; lastMsg=msg;
  say(msg, {onDone: then});
}

/* =====================================================================
   닷패드(Web Bluetooth) — 선택적 출력 훅 (SDK 있으면 사용, 없으면 무시)
   ※ 실기기 출력은 행 단위 LIVE 전송 규약을 따르는 어댑터가 필요(개발팀 SDK 확정 후 연결).
      여기서는 SDK가 주입돼 있으면 누적 프레임을 안전하게 전달하는 자리만 마련.
   ===================================================================== */
/* =====================================================================
   닷패드(Web Bluetooth) — 실제 연결 / 행 단위 출력 / 본체 버튼 입력
   - SDK는 연결 시점에 동적 import → 없거나 경로 문제여도 게임은 정상 동작
   - 출력은 행 단위 displayLineData + 변경된 행만(dedupe) + 1초 keep-alive
     (임베드 규격 §3-1: 전체 전송 대신 행 단위, BoardInfo 후 전송, 윗행 떨림 방지)
   ===================================================================== */
const PAD = { sdk:null, dev:null, mod:null, ready:false, lastRows:[], lastSentRow:-1, ka:null };
function cellByte(grid, cellRow, cellCol){
  // 셀 = 2(가로)×4(세로) 핀, bit = (y%4) + (x%2)*4  (인계 규격 고정값)
  let b=0;
  for(let cx=0;cx<2;cx++) for(let cy=0;cy<4;cy++){
    const X=cellCol*2+cx, Y=cellRow*4+cy;
    if(grid[Y] && grid[Y][X]) b |= 1 << (cy + cx*4);
  }
  return b;
}
function rowHex(grid, cellRow, cols){
  let hex=""; for(let c=0;c<cols;c++) hex += cellByte(grid,cellRow,c).toString(16).padStart(2,"0"); return hex;
}
function pushDevice(){
  if(!PAD.ready || !PAD.dev || !PAD.sdk || !PAD.mod) return;
  const cols=PAD.dev.numberCellColumns|0, rows=PAD.dev.numberCellRows|0;
  if(cols<=0 || rows<=0) return;
  const grid=buildGridScaled(cols*2, rows*4);
  for(let r=0;r<rows;r++){ const hex=rowHex(grid,r,cols);
    if(PAD.lastRows[r]!==hex){ PAD.lastRows[r]=hex;
      try{ PAD.sdk.displayLineData(r,0,hex,PAD.mod.DisplayMode.GraphicMode,PAD.dev); PAD.lastSentRow=r; }catch(e){}
    }
  }
}
function startKeepAlive(){ stopKeepAlive(); PAD.ka=setInterval(()=>{
  if(PAD.ready && PAD.dev && PAD.lastSentRow>=0 && PAD.lastRows[PAD.lastSentRow]!=null){
    try{ PAD.sdk.displayLineData(PAD.lastSentRow,0,PAD.lastRows[PAD.lastSentRow],PAD.mod.DisplayMode.GraphicMode,PAD.dev); }catch(e){}
  }
},1000); }
function stopKeepAlive(){ if(PAD.ka){ clearInterval(PAD.ka); PAD.ka=null; } }
function updatePadBtn(){ const b=document.getElementById("pad-btn"); if(!b) return;
  b.classList.toggle("on", !!PAD.ready); b.setAttribute("aria-label", PAD.ready?"닷패드 연결됨 (눌러서 해제)":"닷패드 연결");
}
async function connectPad(){
  if(PAD.ready){ try{ PAD.sdk.disconnect(PAD.dev); }catch(e){} PAD.ready=false; stopKeepAlive(); updatePadBtn(); setStatus("닷패드 연결을 해제했어요."); return; }
  try{
    setStatus("닷패드 검색 중… 페어링 창에서 기기를 선택하세요.");
    const mod = await import("./dotpad-sdk/DotPadSDK-3.0.0.js");
    PAD.mod = mod;
    const device = await new mod.DotPadScanner().startBleScan();
    if(!device){ setStatus("연결을 취소했어요."); return; }
    PAD.sdk = new mod.DotPadSDK();
    const dev = await PAD.sdk.connectBleDevice(device);
    if(!dev){ setStatus("닷패드 연결에 실패했어요. 다시 시도해 주세요."); return; }
    PAD.dev = dev; PAD.lastRows=[]; PAD.lastSentRow=-1;
    PAD.sdk.setCallBack(
      (d, code)=>{                       // 상태: BoardInfo/Connected 후에만 전송 시작
        if(code===mod.DataCodes.BoardInfo || code===mod.DataCodes.Connected){
          PAD.ready=true; PAD.lastRows=[]; updatePadBtn(); pushDevice(); startKeepAlive();
        } else if(code===mod.DataCodes.Disconnected){
          PAD.ready=false; stopKeepAlive(); updatePadBtn(); setStatus("닷패드 연결이 끊어졌어요.");
        }
      },
      (d, key)=>{                        // 본체 버튼 → 게임 조작
        if(key===mod.KeyCodes.PanningLeft) move(-1);
        else if(key===mod.KeyCodes.PanningRight) move(1);
        else if(key===mod.KeyCodes.KeyFunction1) playSel();
        else if(key===mod.KeyCodes.KeyFunction2) readSel();
        else if(key===mod.KeyCodes.KeyFunction3) readTotal();
        else if(key===mod.KeyCodes.KeyFunction4 || key===mod.KeyCodes.PanningAll) announce();
      }
    );
    setStatus("닷패드 연결됨! 패닝키로 카드 이동, F1 내기, F2 고른 카드, F3 누적 점수, F4 전체 듣기.");
    updatePadBtn();
  }catch(e){ setStatus("닷패드 오류: " + (e && e.message ? e.message : String(e))); }
}

/* ---------- 시작 ---------- */
window.addEventListener("load",()=>{ postToParent({type:"ready"}); newGame(); });
</script>
