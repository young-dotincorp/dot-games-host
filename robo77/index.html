window.startTutorial = function() {
  tutStep = 0;
  showScreen('game');
  document.body.classList.add('tut-on');
    tutPaused = false; { var _tp=document.getElementById('tut-pause'); if(_tp) _tp.innerHTML = '<svg class="tbi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="5" width="4" height="14" rx="1" /><rect x="14" y="5" width="4" height="14" rx="1" /></svg> 일시정지'; }
  document.getElementById('tut-overlay').style.display = 'flex';
  renderTutStep();
};

window.tutorialExit = function() {
  cancelTutAuto(); cancelTutBlink(); cancelSpeak();
  document.getElementById('tut-overlay').style.display = 'none';
  document.body.classList.remove('tut-on');
  const descEl2 = document.getElementById('tut-turn-desc');
  if (descEl2) descEl2.style.display = 'none';
  const turnEl = document.getElementById('turn-text');
  if (turnEl) { turnEl.textContent = '게임 준비 중...'; turnEl.className = 'turn-text'; turnEl.style.display = ''; }
  const dpEl = document.getElementById('tut-dotpad-in-game');
  if (dpEl) { dpEl.innerHTML = ''; dpEl.style.display = 'none'; }
  document.getElementById('players-panel').innerHTML = '';
  document.getElementById('hand-area').innerHTML = '';
  const totalEl = document.getElementById('total-number');
  if (totalEl) { totalEl.textContent = '0'; totalEl.className = 'total-number safe'; }
  const fa = document.getElementById('footer-actions');
  if (fa) fa.style.display = '';
  showScreen('home');
};

window.tutorialPause = function() {
  tutPaused = !tutPaused;
  var btn = document.getElementById('tut-pause');
  if (tutPaused) {
    cancelSpeak(); cancelTutAuto();
    if (btn) btn.innerHTML = '<svg class="tbi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16l13 -8z" /></svg> 재생';
  } else {
    if (btn) btn.innerHTML = '<svg class="tbi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="5" width="4" height="14" rx="1" /><rect x="14" y="5" width="4" height="14" rx="1" /></svg> 일시정지';
    renderTutStep();
  }
};
window.tutorialPrev = function() {
  cancelTutAuto();
  if (tutStep > 0) { tutStep--; renderTutStep(); }
};

window.tutorialNext = function() {
  cancelTutAuto();
  if (tutStep < TUTORIAL_STEPS.length - 1) {
    tutStep++;
    renderTutStep();
  } else {
    cancelTutAuto(); cancelTutBlink();
    window.speechSynthesis && window.speechSynthesis.cancel();
    document.getElementById('tut-overlay').style.display = 'none';
    const turnEl = document.getElementById('turn-text');
    const descElN = document.getElementById('tut-turn-desc');
    if (descElN) descElN.style.display = 'none';
    if (turnEl) { turnEl.textContent = '게임 준비 중...'; turnEl.className = 'turn-text'; turnEl.style.display = ''; }
    const dpEl = document.getElementById('tut-dotpad-in-game');
    if (dpEl) { dpEl.innerHTML = ''; dpEl.style.display = 'none'; }
    document.getElementById('players-panel').innerHTML = '';
    document.getElementById('hand-area').innerHTML = '';
    const fa = document.getElementById('footer-actions');
    if (fa) fa.style.display = '';
    document.body.classList.remove('tut-on');
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    var _homeScr = document.getElementById('screen-home');
    if (_homeScr) _homeScr.classList.add('active');
    if (typeof sendResizeMsg === 'function') sendResizeMsg();
    notify('튜토리얼 완료! 이제 게임을 시작해봐요 🎉');
  }
};

window.tutorialSpeak = function() {
  const s = TUTORIAL_STEPS[tutStep];
  if (s) { cancelSpeak(); speak(s.tts); }
};

function cancelTutBlink() {
  if (tutBlinkTimer) { clearInterval(tutBlinkTimer); tutBlinkTimer = null; }
}

let tutAutoTimer = null;
  let tutPaused = false;

function cancelTutAuto() {
  if (tutAutoTimer) { clearTimeout(tutAutoTimer); tutAutoTimer = null; }
}

function renderTutStep() {
  const s = TUTORIAL_STEPS[tutStep];
  const total = TUTORIAL_STEPS.length;
  const stepAtRender = tutStep;

  cancelTutAuto();
  cancelTutBlink();

  // ── 오버레이 네비게이션 업데이트 ──────────────────────────
  document.getElementById('tut-section-badge').textContent = s.section;
  document.getElementById('tut-step-num').textContent = (tutStep + 1) + ' / ' + total;
  document.getElementById('tut-progress-bar').style.width = (((tutStep + 1) / total) * 100) + '%';
  document.getElementById('tut-prev').disabled = tutStep === 0;
  { var _nx=document.getElementById('tut-next'); _nx.innerHTML = s.isLast ? '<svg class="tbi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5h3.5a5 5 0 0 1 0 10h-5.5l-4.015 4.227a2.3 2.3 0 0 1 -3.923 -2.035l1.634 -8.173a5 5 0 0 1 4.904 -4.019h3.4" /><path d="M14 15l4.07 4.284a2.3 2.3 0 0 0 3.925 -2.023l-1.6 -8.232" /><path d="M8 9v2" /><path d="M7 10h2" /><path d="M14 10h2" /></svg> 게임 시작' : '다음 ▶'; }

  // ── 게임 화면 요소 업데이트 ───────────────────────────────
  // 하단 제목+설명+TTS 표시
  const descEl = document.getElementById('tut-turn-desc');
  if (descEl) {
    document.getElementById('tut-title').textContent = s.title;
    document.getElementById('tut-text').textContent = s.text || '';
    const ttsDesc = document.getElementById('tut-tts-desc');
    if (ttsDesc) ttsDesc.textContent = s.tts || '';
    descEl.style.display = 'block';
  }
  // turn-text 튜토리얼 중 숨김
  const turnEl = document.getElementById('turn-text');
  if (turnEl) { turnEl.style.display = 'none'; }

  // 카드 내기 버튼 숨김
  const fa = document.getElementById('footer-actions');
  if (fa) fa.style.display = 'none';

  // last-card-display 숨김
  const lcd = document.getElementById('last-card-display');
  if (lcd) lcd.style.display = 'none';

  // 현재 합계 업데이트
  const totalEl = document.getElementById('total-number');
  if (totalEl && s.graphic && s.graphic.total != null) {
    const t = s.graphic.total;
    totalEl.textContent = t;
    totalEl.className = 'total-number ' + (t >= 66 ? 'danger' : t >= 44 ? 'warn' : 'safe');
  }

  // 플레이어 패널 업데이트 - 내 목숨(1P)만 표시
  const panel = document.getElementById('players-panel');
  if (panel && s.gameScreen && s.gameScreen.lives) {
    const myLives = s.gameScreen.lives[0];
    const lifeDots = [0,1,2].map(li =>
      `<div class="life-dot${li >= myLives ? ' lost' : ''}"></div>`).join('');
    panel.innerHTML = `<div class="player-chip active-turn">
      <div class="player-chip-name active-name">내 목숨</div>
      <div class="lives-row">${lifeDots}</div>
    </div>`;
  } else if (panel) {
    panel.innerHTML = '';
  }

  // 패 업데이트
  const handArea = document.getElementById('hand-area');
  if (handArea && s.gameScreen && s.gameScreen.hand && s.gameScreen.hand.length > 0) {
    const typeClass = { number:'card-type-num', minus10:'card-type-minus', times2:'card-type-times', direction:'card-type-dir' };
    handArea.innerHTML = s.gameScreen.hand.map((c, i) => {
      const sel = i === s.gameScreen.selectedCard ? ' selected' : '';
      const lbl = c.type === 'number' ? c.value : c.type === 'minus10' ? '-10' : c.type === 'times2' ? '×2' : '↺';
      return `<div class="card ${typeClass[c.type] || ''}${sel}"><div class="card-value">${lbl}</div></div>`;
    }).join('');
  } else if (handArea) {
    handArea.innerHTML = '';
  }

  // ── 닷패드 미리보기 (game-center 안) ──────────────────────
  const dpEl = document.getElementById('tut-dotpad-in-game');
  if (s.type === 'buttons') {
    if (dpEl) { dpEl.innerHTML = buildButtonDiagramHTML(); dpEl.style.display = 'block'; }
  } else if (s.type === 'cards') {
    if (dpEl) { dpEl.innerHTML = buildCardsDemoHTML(); dpEl.style.display = 'block'; }
  } else {
    const hexStr = s.graphic ? buildTutGraphic(s.graphic) : '00'.repeat(300);
    const brailleHex = s.braille ? cardToBraille({ type:'number', value:parseInt(s.braille) }) : null;
    if (dpEl) {
      dpEl.innerHTML = buildDotPadSVG(hexStr, s.highlight, brailleHex);
      dpEl.style.display = 'block';
    }
    if (dotpadConnected) {
      try { sdk.displayGraphicData(hexStr); } catch(e) {}
      if (brailleHex) {
        try { sdk.displayTextData(brailleHex); } catch(e) {}
      } else if (s.graphic && s.graphic.total !== null && s.graphic.total !== undefined) {
        try { sdk.displayTextData(totalToBraille(s.graphic.total)); } catch(e) {}
      }
      if (s.highlight === 'life' || s.highlight === 'player') {
        let on = true, blinkCount = 0;
        tutBlinkTimer = setInterval(function() {
          on = !on; blinkCount++;
          try { sdk.displayGraphicData(on ? hexStr : '00'.repeat(300)); } catch(e) {}
          if (blinkCount >= 8) {
            clearInterval(tutBlinkTimer); tutBlinkTimer = null;
            try { sdk.displayGraphicData(hexStr); } catch(e) {}
          }
        }, 600);
      }
    }
  }

  // ── TTS 재생 + 자동 다음 ──────────────────────────────────
  cancelSpeak();
  if (!tutPaused) speak(s.tts, function() {
    if (tutStep !== stepAtRender) return;
    if (s.isLast) return;
    tutAutoTimer = setTimeout(function() {
      if (tutStep === stepAtRender) tutorialNext();
    }, 1500);
  });
}

</script>
