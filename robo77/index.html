// ============================================================
// TUTORIAL SYSTEM
// ============================================================
let tutStep = 0;
let tutBlinkTimer = null;

// 그래픽 셀 핀 추출 (column-major: 좌열 bits0-3, 우열 bits4-7)
function graphicPin(byte, pr, pc) { return (byte >> (pc === 0 ? pr : pr + 4)) & 1; }
// 점자 핀 추출 (표준 8점 점자)
function braillePin(byte, pr, pc) {
  const bit = pc === 0 ? (pr === 3 ? 6 : pr) : (pr === 3 ? 7 : pr + 3);
  return (byte >> bit) & 1;
}

function buildTutGraphic({ lives = 3, playerIdx = 0, total = null } = {}) {
  const ROWS = 10, COLS = 30;
  const data = new Uint8Array(ROWS * COLS);
  const chipStarts = [0, 3, 6];
  for (let li = 0; li < 3; li++) {
    const cs = chipStarts[li];
    const pat = li < lives ? CHIP_FILLED : CHIP_HOLLOW;
    data[cs] = pat[0]; data[cs + 1] = pat[1];
  }
  const ppat = PLAYER_BRAILLE_GFX[Math.min(playerIdx, 3)];
  for (let r = 0; r < 4; r++) {
    data[r * COLS + 26] = ppat[r][0] ? 0xFF : 0x00;
    data[r * COLS + 27] = ppat[r][1] ? 0xFF : 0x00;
  }
  if (total !== null) {
    const numStr = String(total);
    const DW = 4, DH = 5, GAP = 2;
    const numW = numStr.length * DW + (numStr.length - 1) * GAP;
    const startCol = Math.floor((COLS - numW) / 2);
    for (let d = 0; d < numStr.length; d++) {
      const p2 = DIGIT_4x5[numStr[d]] || DIGIT_4x5['0'];
      const colOff = startCol + d * (DW + GAP);
      for (let r = 0; r < DH; r++) for (let c = 0; c < DW; c++) {
        const row = 2 + r, col = colOff + c;
        if (row < ROWS && col >= 0 && col < COLS)
          data[row * COLS + col] = p2[r * DW + c] ? 0xFF : 0x00;
      }
    }
  }
  return Array.from(data).map(b => b.toString(16).padStart(2, '0')).join('');
}

function buildDotPadSVG(hexStr, highlight, brailleHex) {
  const ROWS = 10, COLS = 30, PS = 4, S = 5;
  const W = COLS * 2 * S, H = ROWS * 4 * S;
  const data = [];
  for (let i = 0; i < ROWS * COLS; i++) data.push(parseInt(hexStr.slice(i*2, i*2+2), 16) || 0);

  let rects = '';
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const b = data[row * COLS + col];
      for (let pr = 0; pr < 4; pr++) for (let pc = 0; pc < 2; pc++) {
        const x = (col*2+pc)*S+1, y = (row*4+pr)*S+1;
        rects += `<rect x="${x}" y="${y}" width="${PS}" height="${PS}" rx="1" fill="${graphicPin(b,pr,pc)?'#d0d0ec':'#16163a'}"/>`;
      }
    }
  }

  const anim = `<animate attributeName="opacity" values="1;0.2;1;0.2;1;0.2;1;0.2;1" dur="2.4s" repeatCount="1" fill="freeze"/>`;
  let hl = '';
  if (highlight === 'life') {
    hl = `<rect x="1" y="1" width="${8*2*S-1}" height="${4*S-1}" fill="rgba(34,211,238,0.08)" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,2" rx="3">${anim}</rect>
    <text x="${4*2*S}" y="${4*S+13}" font-size="9" fill="#22d3ee" text-anchor="middle" font-family="sans-serif">목숨 칩</text>`;
  } else if (highlight === 'player') {
    const px = 26*2*S;
    hl = `<rect x="${px}" y="1" width="${2*2*S-1}" height="${4*4*S-1}" fill="rgba(245,166,35,0.06)" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="5,2" rx="3">${anim}</rect>
    <text x="${px+2*S}" y="${4*4*S+13}" font-size="9" fill="#f5a623" text-anchor="middle" font-family="sans-serif">플레이어</text>`;
  } else if (highlight === 'number') {
    hl = `<rect x="${3*2*S}" y="${2*4*S}" width="${24*2*S}" height="${5*4*S}" fill="rgba(126,200,227,0.06)" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="5,2" rx="3">${anim}</rect>
    <text x="${15*2*S}" y="${7*4*S+13}" font-size="9" fill="#7ec8e3" text-anchor="middle" font-family="sans-serif">합계 숫자</text>`;
  } else if (highlight === 'braille') {
    hl = `<rect x="1" y="${9*4*S}" width="${W-1}" height="${4*S-1}" fill="rgba(167,139,250,0.06)" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,2" rx="3">${anim}</rect>
    <text x="${W/2}" y="${10*4*S+13}" font-size="9" fill="#a78bfa" text-anchor="middle" font-family="sans-serif">점자 텍스트 줄</text>`;
  }

  let out = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H+16}" width="${W}" height="${H+16}" style="max-width:100%;height:auto">
    <rect width="${W}" height="${H}" fill="#07070f" rx="4" stroke="#1e1e3a" stroke-width="1"/>
    ${rects}${hl}
  </svg>`;

  if (brailleHex) {
    const BC = 20, BW = BC*2*S, BH = 4*S;
    const bd = [];
    for (let i = 0; i < BC; i++) bd.push(parseInt(brailleHex.slice(i*2, i*2+2), 16) || 0);
    let br = '';
    for (let col = 0; col < BC; col++) {
      const b = bd[col];
      for (let pr = 0; pr < 4; pr++) for (let pc = 0; pc < 2; pc++) {
        const x = (col*2+pc)*S+1, y = pr*S+1;
        br += `<rect x="${x}" y="${y}" width="${PS}" height="${PS}" rx="1" fill="${braillePin(b,pr,pc)?'#d0d0ec':'#16163a'}"/>`;
      }
    }
    out += `<div style="font-size:9px;color:var(--text2);text-align:center;margin:4px 0 2px">점자 텍스트 줄 (선택 카드)</div>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${BW} ${BH}" width="${BW}" height="${BH}" style="max-width:100%;height:auto">
      <rect width="${BW}" height="${BH}" fill="#07070f" rx="3" stroke="#1e1e3a" stroke-width="1"/>
      ${br}
    </svg>`;
  }
  return out;
}

function buildGameScreenHTML({ lives = [3,3], currentPlayer = 0, total = 0, hand = [], selectedCard = -1, required = 1 } = {}, highlight = null, dotpadSvg = '', turnText = '') {
  const playerLabels = ['1P', '2P', '3P', '4P'];
  const hl = (section) => highlight === section
    ? 'style="outline:2px solid var(--accent);outline-offset:3px;border-radius:6px;animation:tut-hl-pulse 1.2s ease-in-out 4"'
    : '';

  // 플레이어 목숨 영역
  const playersHtml = lives.map((l, i) => {
    const chips = '❤️'.repeat(Math.max(0,l)) + '🖤'.repeat(Math.max(0, 3 - l));
    const cls = 'tut-game-player' + (i === currentPlayer ? ' cur' : '');
    return `<div class="${cls}">${playerLabels[i]}&nbsp;${chips}</div>`;
  }).join('');

  const totalCls = total >= 66 ? 'danger' : total >= 44 ? 'warn' : '';
  const reqHtml = required > 1
    ? `<div class="tut-game-req" ${hl('braille')}>×2 — ${required}장 내야 함</div>`
    : '';

  const handHtml = hand.map((c, i) => {
    const tc = c.type === 'number' ? 'num' : c.type === 'minus10' ? 'minus' : c.type === 'times2' ? 'times' : 'dir';
    const sel = i === selectedCard ? ' selected' : '';
    const lbl = c.type === 'number' ? c.value : c.type === 'minus10' ? '-10' : c.type === 'times2' ? '×2' : '↺';
    return `<div class="tut-game-card ${tc}${sel}">${lbl}</div>`;
  }).join('');

  const dotpadMini = dotpadSvg
    ? `<div style="margin:6px auto 2px;max-width:160px;opacity:0.85">${dotpadSvg}</div>`
    : '';

  return `<div class="tut-game-lbl">게임 화면 미리보기</div>
  <div ${hl('life')} style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;padding:4px;width:100%">${playersHtml}</div>
  <div class="tut-game-total ${totalCls}" ${hl('number')}>${total}</div>
  ${dotpadMini}
  ${reqHtml}
  ${handHtml ? `<div class="tut-game-hand" ${hl('braille')}>${handHtml}</div>` : ''}
  ${highlight === 'player' ? `<div style="font-size:10px;color:var(--accent2);text-align:center;padding:2px 0">▶ ${playerLabels[currentPlayer]} 차례</div>` : ''}
  ${turnText ? `<div class="tut-game-turn"><svg class="tbi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 20l1.3 -3.9c-2.324 -3.437 -1.426 -7.872 2.1 -10.374c3.526 -2.501 8.59 -2.296 11.845 .48c3.255 2.777 3.695 7.266 1.029 10.501c-2.666 3.235 -7.615 4.215 -11.574 2.293l-4.7 1" /></svg> ${turnText}</div>` : ''}`;
}

  if (totalEl) { totalEl.textContent = '0'; totalEl.className = 'total-number safe'; }
  const fa = document.getElementById('footer-actions');

};

    if (btn) btn.innerHTML = '<svg class="tbi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16l13 -8z" /></svg> 다시듣기';
  } else {
    if (btn) btn.innerHTML = '<svg class="tbi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="5" width="4" height="14" rx="1" /><rect x="14" y="5" width="4" height="14" rx="1" /></svg> 일시정지';
    renderTutStep();
  }
};
window.tutorialPrev = function() {
  cancelTutAuto();
  if (tutStep > 0) { tutStep--; renderTutStep(); }
};

window.tutorialNext = function() {
  cancelTutAuto();
  if (tutStep < TUTORIAL_STEPS.length - 1) {
    tutStep++;
    renderTutStep();
  } else {
    cancelTutAuto(); cancelTutBlink();
    window.speechSynthesis && window.speechSynthesis.cancel();
    document.getElementById('tut-overlay').style.display = 'none';
    const turnEl = document.getElementById('turn-text');
    const descElN = document.getElementById('tut-turn-desc');
    if (descElN) descElN.style.display = 'none';
    if (turnEl) { turnEl.textContent = '게임 준비 중...'; turnEl.className = 'turn-text'; turnEl.style.display = ''; }
    const dpEl = document.getElementById('tut-dotpad-in-game');
    if (dpEl) { dpEl.innerHTML = ''; dpEl.style.display = 'none'; }
    document.getElementById('players-panel').innerHTML = '';
    document.getElementById('hand-area').innerHTML = '';
    const fa = document.getElementById('footer-actions');
    if (fa) fa.style.display = '';
    document.body.classList.remove('tut-on');
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    var _homeScr = document.getElementById('screen-home');
    if (_homeScr) _homeScr.classList.add('active');
    if (typeof sendResizeMsg === 'function') sendResizeMsg();
    notify('튜토리얼 완료! 이제 게임을 시작해봐요 🎉');
  }
};

window.tutorialSpeak = function() {
  const s = TUTORIAL_STEPS[tutStep];
  if (s) { cancelSpeak(); speak(s.tts); }
};

function cancelTutBlink() {
  if (tutBlinkTimer) { clearInterval(tutBlinkTimer); tutBlinkTimer = null; }
}

let tutAutoTimer = null;
  let tutPaused = false;

function cancelTutAuto() {
  if (tutAutoTimer) { clearTimeout(tutAutoTimer); tutAutoTimer = null; }
}

function renderTutStep() {
  const s = TUTORIAL_STEPS[tutStep];
  const total = TUTORIAL_STEPS.length;
  const stepAtRender = tutStep;

  cancelTutAuto();
  cancelTutBlink();

  // ── 오버레이 네비게이션 업데이트 ──────────────────────────
  document.getElementById('tut-section-badge').textContent = s.section;
  document.getElementById('tut-step-num').textContent = (tutStep + 1) + ' / ' + total;
  document.getElementById('tut-progress-bar').style.width = (((tutStep + 1) / total) * 100) + '%';
  document.getElementById('tut-prev').disabled = tutStep === 0;
  { var _nx=document.getElementById('tut-next'); _nx.innerHTML = s.isLast ? '<svg class="tbi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5h3.5a5 5 0 0 1 0 10h-5.5l-4.015 4.227a2.3 2.3 0 0 1 -3.923 -2.035l1.634 -8.173a5 5 0 0 1 4.904 -4.019h3.4" /><path d="M14 15l4.07 4.284a2.3 2.3 0 0 0 3.925 -2.023l-1.6 -8.232" /><path d="M8 9v2" /><path d="M7 10h2" /><path d="M14 10h2" /></svg> 게임 시작' : '다음 ▶'; }

  // ── 게임 화면 요소 업데이트 ───────────────────────────────
  // 하단 제목+설명+TTS 표시
  const descEl = document.getElementById('tut-turn-desc');
  if (descEl) {
    document.getElementById('tut-title').textContent = s.title;
    document.getElementById('tut-text').textContent = s.text || '';
    const ttsDesc = document.getElementById('tut-tts-desc');
    if (ttsDesc) ttsDesc.textContent = s.tts || '';
    descEl.style.display = 'block';
  }
  // turn-text 튜토리얼 중 숨김
  const turnEl = document.getElementById('turn-text');
  if (turnEl) { turnEl.style.display = 'none'; }

  // 카드 내기 버튼 숨김
  const fa = document.getElementById('footer-actions');
  if (fa) fa.style.display = 'none';

  // last-card-display 숨김
  const lcd = document.getElementById('last-card-display');
  if (lcd) lcd.style.display = 'none';

  // 현재 합계 업데이트
  const totalEl = document.getElementById('total-number');
  if (totalEl && s.graphic && s.graphic.total != null) {
    const t = s.graphic.total;
    totalEl.textContent = t;
    totalEl.className = 'total-number ' + (t >= 66 ? 'danger' : t >= 44 ? 'warn' : 'safe');
  }

  // 플레이어 패널 업데이트 - 내 목숨(1P)만 표시
  const panel = document.getElementById('players-panel');
  if (panel && s.gameScreen && s.gameScreen.lives) {
    const myLives = s.gameScreen.lives[0];
    const lifeDots = [0,1,2].map(li =>
      `<div class="life-dot${li >= myLives ? ' lost' : ''}"></div>`).join('');
    panel.innerHTML = `<div class="player-chip active-turn">
      <div class="player-chip-name active-name">내 목숨</div>
      <div class="lives-row">${lifeDots}</div>
    </div>`;
  } else if (panel) {
    panel.innerHTML = '';
  }

  // 패 업데이트
  const handArea = document.getElementById('hand-area');
  if (handArea && s.gameScreen && s.gameScreen.hand && s.gameScreen.hand.length > 0) {
    const typeClass = { number:'card-type-num', minus10:'card-type-minus', times2:'card-type-times', direction:'card-type-dir' };
    handArea.innerHTML = s.gameScreen.hand.map((c, i) => {
      const sel = i === s.gameScreen.selectedCard ? ' selected' : '';
      const lbl = c.type === 'number' ? c.value : c.type === 'minus10' ? '-10' : c.type === 'times2' ? '×2' : '↺';
      return `<div class="card ${typeClass[c.type] || ''}${sel}"><div class="card-value">${lbl}</div></div>`;
    }).join('');
  } else if (handArea) {
    handArea.innerHTML = '';
  }

  // ── 닷패드 미리보기 (game-center 안) ──────────────────────
  const dpEl = document.getElementById('tut-dotpad-in-game');
  if (s.type === 'buttons') {
    if (dpEl) { dpEl.innerHTML = buildButtonDiagramHTML(); dpEl.style.display = 'block'; }
  } else if (s.type === 'cards') {
    if (dpEl) { dpEl.innerHTML = buildCardsDemoHTML(); dpEl.style.display = 'block'; }
  } else {
    const hexStr = s.graphic ? buildTutGraphic(s.graphic) : '00'.repeat(300);
    const brailleHex = s.braille ? cardToBraille({ type:'number', value:parseInt(s.braille) }) : null;
    if (dpEl) {
      dpEl.innerHTML = buildDotPadSVG(hexStr, s.highlight, brailleHex);
      dpEl.style.display = 'block';
    }
    if (dotpadConnected) {
      try { sdk.displayGraphicData(hexStr); } catch(e) {}
      if (brailleHex) {
        try { sdk.displayTextData(brailleHex); } catch(e) {}
      } else if (s.graphic && s.graphic.total !== null && s.graphic.total !== undefined) {
        try { sdk.displayTextData(totalToBraille(s.graphic.total)); } catch(e) {}
      }
      if (s.highlight === 'life' || s.highlight === 'player') {
        let on = true, blinkCount = 0;
        tutBlinkTimer = setInterval(function() {
          on = !on; blinkCount++;
          try { sdk.displayGraphicData(on ? hexStr : '00'.repeat(300)); } catch(e) {}
          if (blinkCount >= 8) {
            clearInterval(tutBlinkTimer); tutBlinkTimer = null;
            try { sdk.displayGraphicData(hexStr); } catch(e) {}
          }
        }, 600);
      }
    }
  }

  // ── TTS 재생 + 자동 다음 ──────────────────────────────────
  cancelSpeak();
  if (!tutPaused) speak(s.tts, function() {
    if (tutStep !== stepAtRender || !document.body.classList.contains('tut-on')) return;
    if (s.isLast) return;
    tutAutoTimer = setTimeout(function() {
      if (tutStep === stepAtRender && document.body.classList.contains('tut-on')) tutorialNext();
    }, 1500);
  });
}


/* ===== 뒤로가기 → 게임시작(home) 화면 (게임 자체 히스토리) ===== */
(function(){
  var _ss = window.showScreen;
  if (typeof _ss !== "function") return;
  var trapped = false;
  function ensureTrap(){ if(!trapped){ try{ history.pushState({rb77:1}, "") }catch(e){} trapped=true; } }
  window.showScreen = function(name){
    _ss(name);
    if (name === "home") trapped = false; else ensureTrap();
  };
  window.addEventListener("popstate", function(){
    // 튜토리얼 진행 중 뒤로가기 → 완전 종료(TTS·타이머·오버레이 정리 후 home)
    if (document.body.classList.contains("tut-on") && typeof window.tutorialExit === "function") {
      trapped = false; window.tutorialExit(); return;
    }
    var home = document.getElementById("screen-home");
    if (home && !home.classList.contains("active")) { trapped = false; _ss("home"); }
  });
})();
</script>
