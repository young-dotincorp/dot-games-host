<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dot Forest Preview</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #0d1a0e;
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    h1 {
      margin: 0 0 28px;
      font-size: clamp(28px, 4vw, 48px);
    }

    .gallery {
      display: grid;
      gap: 32px;
    }

    section {
      padding: 20px;
      border-radius: 28px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 24px 60px rgba(0,0,0,0.28);
    }

    h2 {
      margin: 0 0 16px;
      font-size: 22px;
    }

    img {
      width: 100%;
      max-width: 1280px;
      display: block;
      border-radius: 20px;
      background: #102010;
    }
  </style>
</head>
<body>
  <h1>Dot Forest 대표 게임 화면 3장</h1>

  <div class="gallery">
    <section>
      <h2>1. Home Screen</h2>
      <img src="./assets/main_image.png" alt="Dot Forest home screen">
    </section>

    <section>
      <h2>2. Gameplay Screen</h2>
      <img src="./assets/play_image.png" alt="Dot Forest gameplay screen">
    </section>

    <section>
      <h2>3. World Map Screen</h2>
      <img src="./assets/world map screen.png" alt="Dot Forest world map screen">
    </section>
  </div>
</body>
</html>
