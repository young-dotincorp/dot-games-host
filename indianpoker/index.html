<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>인디언 포커 — Dot Games</title>
<style>
  :root{
    --bg:#14171C; --panel:#1C2128; --panel-2:#222831; --line:#2E343D;
    --ink:#E8EAED; --muted:#9AA0A8;
    --pin-off:#2C323B; --pin-on:#F2C14E; --pin-num:#FFFFFF;
    --accent:#7A6CF0; --accent-ink:#fff; --danger:#E5484D; --good:#3DD68C;
    --p1:#F2C14E; --p2:#6E8EFB;
    --r:14px; --r-sm:10px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .wrap{height:100dvh; display:flex; flex-direction:column; max-width:1100px; margin:0 auto; padding:14px clamp(12px,3vw,28px);}
  header{display:flex; align-items:baseline; gap:12px; flex:none; padding-bottom:10px;}
  header h1{margin:0; font-size:20px; letter-spacing:-.01em;}
  header h1 b{color:var(--accent);}
  header .sub{color:var(--muted); font-size:13px;}
  footer{flex:none; color:var(--muted); font-size:12px; text-align:center; padding-top:8px;}
  body.embed header, body.embed footer{display:none;}

  main{flex:1 1 auto; display:flex; flex-direction:column; gap:14px; min-height:0;}

  .pad{
    flex:1 1 auto; min-height:0; position:relative; background:linear-gradient(180deg,#1F252E 0%,#191D24 100%);
    border:1px solid var(--line); border-radius:var(--r); padding:14px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    display:flex; flex-direction:column; gap:10px;
  }
  .pad-top{display:flex; justify-content:space-between; align-items:center; gap:12px; flex:none;}
  .seat{display:flex; align-items:center; gap:8px;}
  .seat .who{font-size:14px; color:var(--muted); font-variant-numeric:tabular-nums; font-weight:700;}
  .seat.mine .who{color:var(--good);}      /* 나 = 내 칩 색(초록) */
  .seat.opp  .who{color:var(--pin-on);}    /* 상대 = 상대 칩 색(노랑) */
  .seat.mine .turn-dot{background:var(--good);}
  .seat.opp  .turn-dot{background:var(--pin-on);}
  /* 좌석 이름 색은 mine/opp(초록/노랑)로만 통일 — 차례는 점멸 점으로만 표시 */
  .turn-dot{width:8px;height:8px;border-radius:50%;background:var(--accent); opacity:0; transition:opacity .2s;}
  .seat.turn .turn-dot{opacity:1; animation:blink 1s steps(2,start) infinite;}
  @keyframes blink{50%{opacity:.25;}}
  canvas#pad{flex:1 1 auto; width:100%; min-height:0; display:block; image-rendering:pixelated;}
  /* 미리보기 기준 2단 배치: 카드(좌) + 핀그리드(우). 좁은 화면은 세로로 쌓임 */
  .pad-mid{flex:1 1 auto; min-height:0; display:flex; flex-direction:row; gap:24px; align-items:center; justify-content:center;}
  .pad-mid > .cards{align-self:center; flex:none;}
  .pad-mid > canvas#pad{flex:0 1 460px; min-width:0; max-width:460px; aspect-ratio:40/22; height:auto; align-self:center; background:#12151B; border:1px solid var(--line); border-radius:12px;}
  @media (max-width:640px){ .pad-mid{flex-direction:column; align-items:stretch;} .pad-mid > canvas#pad{flex:1 1 auto; width:100%; max-width:none;} }
  .pad-cap{flex:none; display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted);}
  .pad-cap .pot{font-variant-numeric:tabular-nums;}
  .pad-cap .pot b{color:var(--accent); font-size:15px;}
  .pad-cap .mine b{color:var(--ink); font-size:15px;}

  /* 카드 슬롯 — 화면 전용 연출(핀 그리드/음성과 독립). 아트 오면 background-image만 끼우면 됨 */
  .cards{flex:none; display:flex; gap:16px; justify-content:center; align-items:flex-end; padding:2px 0;}
  .card-slot{display:flex; flex-direction:column; align-items:center; gap:5px;}
  .clabel{font-size:11px; color:var(--muted); letter-spacing:.02em;}
  .cardv{
    width:100px; aspect-ratio:243/360; border-radius:11px; position:relative;
    background:#141821; border:1px solid var(--line);
    background-size:contain; background-repeat:no-repeat; background-position:center;
    box-shadow:0 5px 14px rgba(0,0,0,.34);
    display:flex; align-items:center; justify-content:center;
  }
  .cardv .cnum{font-size:42px; font-weight:900; color:#23262B; font-variant-numeric:tabular-nums; line-height:1;}
  .cardv.back{background:linear-gradient(150deg,#2A263D,#1B1830); border-color:#3A3550;}
  .cardv.back .cnum{display:none;}
  .cardv.back::after{content:""; position:absolute; inset:8px; border-radius:5px;
    background:radial-gradient(circle, rgba(122,108,240,.55) 1.4px, transparent 1.7px) 0 0/12px 12px; opacity:.7;}
  .cardv.pop{animation:cardpop .26s ease;}
  @keyframes cardpop{0%{transform:scale(.7) rotateY(38deg); opacity:.35;} 100%{transform:none; opacity:1;}}
  .cardv.real{background-color:#141821; border-color:var(--line); background-size:contain; background-repeat:no-repeat; background-position:center; box-shadow:0 6px 16px rgba(0,0,0,.4);}
  #card-opp.real{border-color:var(--accent); box-shadow:0 0 0 1.5px rgba(122,108,240,.55), 0 6px 16px rgba(0,0,0,.4);}
  .cardv.real::after{content:none;}

  .status{flex:none; min-height:22px; font-size:14px; color:var(--ink); text-align:center; line-height:1.4;}
  .status.bad{color:var(--danger); font-weight:700;}
  .status.good{color:var(--good); font-weight:700;}
  .status.warn{color:var(--accent); font-weight:700;}

  .controls{flex:none; display:flex; gap:8px; align-items:stretch;}
  .btn{
    flex:1 1 0; border:1px solid var(--line); background:var(--panel-2); color:var(--ink);
    font:inherit; font-weight:600; font-size:14px; padding:13px 10px; border-radius:var(--r-sm);
    cursor:pointer; display:inline-flex; gap:7px; align-items:center; justify-content:center;
    transition:background .12s, border-color .12s, transform .06s; touch-action:manipulation;
  }
  .btn:hover{border-color:#3a424d;}
  .btn:active{transform:translateY(1px);}
  .btn:focus-visible{outline:3px solid var(--accent); outline-offset:2px;}
  .btn:disabled{opacity:.38; cursor:not-allowed;}
  #actions .btn{flex-direction:column; gap:3px; padding:11px 6px;}
  #actions .btn .k{font-size:10px; font-weight:800; opacity:.55; letter-spacing:.04em;}
  #actions .btn .lbl{font-size:14.5px; font-weight:800; line-height:1.1;}
  .act-bet{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}
  .act-bet .k{opacity:.8;}
  .act-allin{background:var(--danger); color:#fff; border-color:var(--danger);}
  .act-allin .k{opacity:.8;}
  .btn.icon{flex:0 0 auto; min-width:54px;}
  .btn svg{width:23px; height:23px; display:block;}
  .btn#pad-btn.on{color:var(--good); border-color:var(--good);}
  .btn#snd-btn.on{color:var(--accent); border-color:var(--accent);}
  body.embed #exit{display:none;}

  .ovl{position:fixed; inset:0; background:rgba(10,12,15,.82); display:flex; align-items:center; justify-content:center; padding:24px; z-index:20;}
  .ovl[hidden]{display:none;}
  .ovl .box{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:28px 26px; max-width:400px; width:100%; text-align:center;}
  .ovl h2{margin:0 0 8px; font-size:24px;} .ovl h2 b{color:var(--accent);}
  .ovl p{margin:0 0 20px; color:var(--muted); font-size:14px; line-height:1.6; white-space:pre-line; text-align:left;}
  .ovl p.center{text-align:center;}
  .ovl .box .btn{width:100%;}
  .ovl .box .btn + .btn{margin-top:10px;}
  .sr{position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0;}

  @media (max-width:560px){ .wrap{padding:10px 12px;} }
  @media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>인디언 <b>포커</b></h1>
    <span class="sub">상대 숫자만 보고 베팅 · 닷패드 심리 게임</span>
  </header>

  <main>
    <section class="pad" id="pad-panel" aria-label="닷패드 화면">
      <div class="pad-top">
        <div class="seat" id="seat-you"><span class="turn-dot"></span><span class="who">나</span></div>
        <div class="seat" id="seat-ai"><span class="who">상대</span><span class="turn-dot"></span></div>
      </div>
      <div class="pad-mid">
      <div class="cards" aria-hidden="true">
        <div class="card-slot"><div class="cardv back" id="card-opp"><span class="cnum"></span></div><div class="clabel">상대 카드</div></div>
        <div class="card-slot"><div class="cardv back" id="card-mine"><span class="cnum"></span></div><div class="clabel">내 카드</div></div>
      </div>
      <canvas id="pad" width="600" height="320" role="img" aria-label="상대 카드 숫자와 칩 게이지"></canvas>
      </div>
      <div class="pad-cap">
        <span>상대 카드 (좌/우 막대 = 칩)</span>
        <span><span class="pot">판돈 <b id="pot-num">0</b>개</span> · <span class="mine">내 카드 <b id="mine-num">?</b></span></span>
      </div>
    </section>

    <p class="status" id="status" aria-live="polite">게임을 시작합니다.</p>

    <div class="controls" id="actions">
      <button class="btn act-fold" id="a-fold" aria-label="다이, 판 포기"><span class="k">F1</span><span class="lbl">다이</span></button>
      <button class="btn act-call" id="a-call" aria-label="체크 또는 콜"><span class="k">F2</span><span class="lbl">체크</span></button>
      <button class="btn act-bet" id="a-bet" aria-label="벳 또는 레이즈"><span class="k">F3</span><span class="lbl">벳 5</span></button>
      <button class="btn act-allin" id="a-allin" aria-label="올인"><span class="k">F4</span><span class="lbl">올인</span></button>
    </div>
    <div class="controls">
      <button class="btn icon" id="speak" aria-label="현재 상황 읽어주기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 8a5 5 0 0 1 0 8" /><path d="M17.7 5a9 9 0 0 1 0 14" /><path d="M6 15h-2a1 1 0 0 1 -1 -1v-4a1 1 0 0 1 1 -1h2l3.5 -4.5a.8 .8 0 0 1 1.5 .5v14a.8 .8 0 0 1 -1.5 .5l-3.5 -4.5" /></svg></button>
      <button class="btn icon" id="pad-btn" aria-label="닷패드 연결"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 8l10 8l-5 4l0 -16l5 4l-10 8" /></svg></button>
      <button class="btn icon on" id="snd-btn" aria-label="소리 끄기"><svg class="on-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 6a9 9 0 0 1 0 12"/></svg><svg class="off-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg></button>
      <button class="btn icon" id="exit" aria-label="나가기">✕</button>
    </div>
  </main>

  <footer>F1 다이 · F2 체크/콜 · F3 벳/레이즈 · F4 올인 · Space 상황 듣기 · 닷패드 키 동일</footer>
</div>

<!-- 라운드/게임 결과 · 핸드오프 오버레이 -->
<div class="ovl" id="ovl" hidden>
  <div class="box">
    <h2 id="ovl-title">라운드 종료</h2>
    <p id="ovl-msg" class="center"></p>
    <button class="btn act-bet" id="ovl-btn">다음 라운드</button>
  </div>
</div>

<!-- 시작 메뉴 -->
<div class="ovl" id="menu" hidden>
  <div class="box">
    <h2>인디언 <b>포커</b></h2>
    <p class="center">내 카드는 못 보고, 상대 숫자만 보면서 베팅해요.
더 높은 숫자가 판돈을 가져갑니다.</p>
    <button class="btn act-bet" id="m-easy">AI와 대결 · 쉬움</button>
    <button class="btn" id="m-hard">AI와 대결 · 어려움</button>
    <button class="btn" id="m-2p">둘이서 · 사람 vs 사람</button>
    <button class="btn" id="m-rules">규칙 보기</button>
  </div>
</div>

<div class="sr" aria-live="assertive" id="sr-live"></div>

<script>
/* =====================================================================
   인디언 포커 — 닷패드 배리어프리 심리 게임
   모드: easy(쉬움 AI) · hard(어려움 AI) · 2p(둘이서 사람 vs 사람, 핸드오프)
   로보77과 동일 인프라(음성·닷패드 SDK·핀 출력·임베드 규격) 재사용
   ===================================================================== */

/* ---------- ① 규칙 ---------- */
const RULES = { startChips:30, ante:1, unit:5, maxCard:10 };

/* ---------- ② 상태 ---------- */
const G = {
  mode:"hard",                 // easy | hard | 2p
  chips:[RULES.startChips, RULES.startChips],
  card:[null,null],            // [0번 카드, 1번 카드]
  contrib:[0,0], pot:0,
  turn:0, first:0,
  viewer:0,                    // 화면에 카드를 보는 사람(자기 카드는 숨김). 2p 핸드오프 중 = -1
  over:true, busy:true, handoff:false, reveal:false, lastCheck:false,
};
function isAI(p){ return G.mode!=="2p" && p===1; }
function seatName(p){ return G.mode==="2p" ? (p===0?"플레이어 1":"플레이어 2") : (p===0?"나":"상대"); }

/* ---------- ③ 상황 ---------- */
function curOwe(p){ return Math.max(0, G.contrib[1-p]-G.contrib[p]); }
function pot(p,amt){ amt=Math.max(0,Math.min(amt,G.chips[p])); G.chips[p]-=amt; G.contrib[p]+=amt; G.pot+=amt; return amt; }

/* ---------- ④ 시작 / 라운드 ---------- */
function startGame(mode){
  G.mode=mode||"hard";
  document.body.classList.toggle("twop", G.mode==="2p");
  hideMenu(); G.chips=[RULES.startChips,RULES.startChips]; G.first=0; startRound();
}
function startRound(){
  if(G.chips[0]<=0 || G.chips[1]<=0){ return gameOver(); }
  G.contrib=[0,0]; G.pot=0; G.lastCheck=false; G.reveal=false; G.over=false; G.busy=true; G.handoff=false;
  let a=1+Math.floor(Math.random()*RULES.maxCard), b;
  do{ b=1+Math.floor(Math.random()*RULES.maxCard); }while(b===a);
  G.card=[a,b];
  for(const p of [0,1]){ pot(p, Math.min(RULES.ante, G.chips[p])); }
  sfx("deal");
  G.turn=G.first; G.viewer = (G.mode==="2p") ? -1 : 0;
  render();
  if(G.mode==="2p"){
    narrate(`새 라운드. 판돈 ${G.pot}개.`, "", ()=> startHandoff(G.first));
  } else {
    narrate(`새 라운드. 상대 카드 ${G.card[1]}. 판돈 ${G.pot}개.`, "", ()=>{
      G.viewer=0;
      if(G.turn===1){ G.busy=true; setTimeout(()=>{ if(!G.over) aiAct(); }, 500); }
      else promptHuman();
    });
  }
}

/* 2인 모드: 차례 넘길 때 기기 전달 화면(상대 카드 비밀 유지) */
function startHandoff(q){
  G.handoff=true; G.viewer=-1; G.busy=true; render();
  const nm=seatName(q);
  say(`${nm} 차례입니다. 기기를 넘기고 준비되면 버튼을 누르세요.`, {assertive:true});
  showOvl(`${nm} 차례`, `기기를 ${nm}에게 넘겨주세요.\n준비되면 버튼을 누르세요.`, "준비 완료", ()=>{
    G.handoff=false; G.viewer=q; render(); promptHuman();
  });
}

/* ---------- ⑤ 액션 (양 플레이어 공용) ---------- */
function actMsg(p, aiMe, aiOpp, twoP){ return G.mode==="2p" ? twoP : (p===0?aiMe:aiOpp); }
function act(p, action){
  if(G.over) return;
  if(G.turn!==p) return;
  if(!isAI(p) && (G.busy||G.handoff)) return;       // 사람 입력은 내 차례·핸드오프 아닐 때만
  const owe=curOwe(p);

  if(action==="fold"){
    const w=1-p, potWas=G.pot; G.chips[w]+=G.pot; G.pot=0; render(); sfx("fold");
    const msg = actMsg(p, "다이. 판을 포기했어요. 상대가 판돈 "+potWas+"개를 가져가요.",
                          "상대가 다이 했어요! 판돈 "+potWas+"개를 얻었어요.",
                          seatName(p)+" 다이. "+seatName(w)+" 판돈 "+potWas+"개 획득.");
    G.busy=true; narrate(msg, (G.mode==="2p"||p===1)?"good":"", ()=> resolveRound(w, msg, false));
    return;
  }
  if(action==="check"){
    if(owe>0) return act(p,"call");
    const msg = actMsg(p, "체크. 칩을 더 걸지 않았어요.", "상대가 체크했어요.", seatName(p)+" 체크."); sfx("check");
    if(G.lastCheck){ G.lastCheck=false; transition(p,msg,()=>showdown()); }
    else { G.lastCheck=true; transition(p,msg,()=>passTurn(1-p)); }
    return;
  }
  if(action==="call"){
    if(owe<=0) return act(p,"check");
    const paid=pot(p, owe); G.lastCheck=false;
    const msg = actMsg(p, "콜. "+paid+"개를 맞췄어요.", "상대가 콜 했어요.", seatName(p)+" 콜. "+paid+"개."); sfx("call");
    transition(p,msg,()=>showdown());
    return;
  }
  if(action==="bet"){
    if(owe>0) return act(p,"raise");
    if(G.chips[p]<=0) return act(p,"check");
    const paid=pot(p, Math.min(RULES.unit, G.chips[p])); G.lastCheck=false;
    const msg = actMsg(p, "벳. "+paid+"개를 걸었어요.", "상대가 "+paid+"개를 걸었어요.", seatName(p)+" 벳. "+paid+"개."); sfx("bet");
    transition(p,msg,()=>passTurn(1-p));
    return;
  }
  if(action==="raise"){
    if(G.chips[p]<=0) return;
    const paid=pot(p, Math.min(owe+RULES.unit, G.chips[p])); G.lastCheck=false;
    const stillOwe = curOwe(p)>0;
    const msg = actMsg(p, "레이즈. "+paid+"개를 걸었어요.", "상대가 레이즈, "+paid+"개를 걸었어요.", seatName(p)+" 레이즈. "+paid+"개."); sfx("raise");
    transition(p,msg, stillOwe ? (()=>showdown()) : (()=>passTurn(1-p)));
    return;
  }
  if(action==="allin"){
    if(G.chips[p]<=0) return;
    const paid=pot(p, G.chips[p]); G.lastCheck=false;
    const msg = actMsg(p, "올인! "+paid+"개 전부 걸었어요.", "상대가 올인! "+paid+"개 전부 걸었어요.", seatName(p)+" 올인! "+paid+"개 전부."); sfx("allin");
    transition(p,msg, curOwe(p)>0 ? (()=>showdown()) : (()=>passTurn(1-p)));
    return;
  }
}
function transition(p,msg,then){ G.busy=true; render(); narrate(msg, "", then); }
function passTurn(q){
  if(G.over) return;
  G.turn=q;
  if(G.mode==="2p"){ startHandoff(q); return; }
  G.viewer=0; render();
  if(q===1){ G.busy=true; setTimeout(()=>{ if(!G.over) aiAct(); }, 550); }
  else promptHuman();
}
function promptHuman(){
  if(G.over) return;
  G.busy=false; render();
  const p=G.turn, owe=curOwe(p), opp=G.card[1-p];
  const lead = (G.mode==="2p") ? seatName(p)+" 차례. " : "내 차례. ";
  const sit = owe>0 ? `상대가 ${owe}개를 걸었어요. 콜·레이즈·다이·올인.` : `평화 상태. 체크·벳·올인·다이.`;
  narrate(`${lead}상대 카드 ${opp}. ${sit}`, owe>0?"warn":"", null);
}

/* ---------- ⑥ AI (쉬움 / 어려움) ---------- */
function aiAct(){
  if(G.over) return;
  const p=1, owe=curOwe(p);
  const winP=(RULES.maxCard - G.card[0])/(RULES.maxCard-1);   // 보이는 상대(나) 숫자로 본 승률
  const r=Math.random();
  if(G.mode==="easy"){
    // 소심하고 실수가 잦음 → 사람이 이기기 쉬움
    if(owe>0){
      if(winP<0.55) return act(p, r<0.35?"call":"fold");       // 약하면 잘 접음
      if(r<0.12 && G.chips[p]>owe) return act(p,"raise");      // 가끔만 공격
      return act(p, r<0.85?"call":"fold");                     // 좋아도 가끔 실수로 폴드
    } else {
      if(winP>0.78 && r<0.45) return act(p,"bet");             // 아주 좋을 때만, 그것도 가끔
      return act(p,"check");                                    // 대부분 체크(가치 못 살림)
    }
  }
  // 어려움
  if(owe>0){
    const canRaise = G.chips[p] > owe;
    if(winP<0.30) return act(p, r<0.15?"call":"fold");
    if(winP>0.9 && canRaise && r<0.18) return act(p,"allin");
    if(winP>0.7 && canRaise && r<0.45) return act(p,"raise");
    return act(p,"call");
  } else {
    if(winP>0.62) return act(p, r<0.7?"bet":"check");
    if(r<0.12) return act(p,"bet");
    return act(p,"check");
  }
}

/* ---------- ⑦ 승부 / 라운드 종료 ---------- */
function showdown(){
  if(G.over) return;
  G.busy=true;
  const lo=Math.min(G.contrib[0],G.contrib[1]);                // 헤즈업 환급(데드머니 방지)
  for(const p of [0,1]){ const ex=G.contrib[p]-lo; if(ex>0){ G.chips[p]+=ex; G.pot-=ex; G.contrib[p]-=ex; } }
  G.reveal=true; render(); sfx("reveal");
  const c0=G.card[0], c1=G.card[1], potWas=G.pot;
  let w; if(c0>c1) w=0; else if(c1>c0) w=1; else w=-1;
  if(w===0) G.chips[0]+=G.pot; else if(w===1) G.chips[1]+=G.pot;
  else { const half=Math.floor(G.pot/2); G.chips[0]+=half; G.chips[1]+=G.pot-half; }
  G.pot=0;
  let msg;
  if(G.mode==="2p"){
    msg = w<0 ? `무승부! 둘 다 ${c0}. 판돈을 나눠요.`
              : `승부! 플레이어 1 ${c0}, 플레이어 2 ${c1}. ${seatName(w)} 승리! 판돈 ${potWas}개.`;
  } else {
    msg = w===0 ? `승부! 내 카드 ${c0}, 상대 ${c1}. 내가 이겼어요. 판돈 ${potWas}개 획득!`
        : w===1 ? `승부! 내 카드 ${c0}, 상대 ${c1}. 상대 승리. 판돈 ${potWas}개를 상대가 가져가요.`
        : `무승부! 둘 다 ${c0}. 판돈을 나눠요.`;
  }
  resolveRound(w, msg, true);
}
function resolveRound(winner, msg, didReveal){
  G.busy=true; G.over=true; if(didReveal) G.reveal=true; render();
  say(msg,{assertive:true});
  const dead = G.chips[0]<=0 || G.chips[1]<=0;
  if(dead){ setTimeout(()=>gameOver(), 250); return; }
  setTimeout(()=>{ if(winner<0) sfx("draw"); else if(G.mode==="2p") sfx("win"); else sfx(winner===0?"win":"lose"); }, 360);
  const cls = winner<0 ? "" : (G.mode==="2p" ? "good" : (winner===0?"good":"bad"));
  setStatusCls(msg, cls);
  const summary = G.mode==="2p" ? `플레이어 1 ${G.chips[0]}개 · 플레이어 2 ${G.chips[1]}개`
                                : `내 칩 ${G.chips[0]}개 · 상대 ${G.chips[1]}개`;
  showOvl("라운드 종료", `${msg}\n\n${summary}`, "다음 라운드", ()=>{ G.first=1-G.first; startRound(); });
}
function gameOver(){
  G.over=true; G.busy=true; render();
  const win = G.chips[0]>0 ? 0 : (G.chips[1]>0 ? 1 : -1);
  let msg;
  if(G.mode==="2p"){ msg = win<0 ? "게임 종료! 무승부." : `게임 종료! ${seatName(win)} 승리! 🎉`; }
  else { msg = win===0 ? "게임 종료! 상대 칩이 바닥났어요. 내 승리! 🎉"
              : win===1 ? "게임 종료! 내 칩이 바닥났어요. 다음엔 이겨봐요."
              : "게임 종료! 무승부."; }
  say(msg,{assertive:true});
  setTimeout(()=>{ if(G.mode==="2p") sfx(win<0?"draw":"overWin"); else sfx(win===0?"overWin":(win===1?"overLose":"draw")); }, 200);
  showOvl("게임 종료", msg, "다시 하기", ()=>{ showMenu(); });
}

const elOpp = document.getElementById("card-opp"), elMine = document.getElementById("card-mine");
if(CARD_ART.face){ elOpp.classList.add("real"); elMine.classList.add("real"); }
function paintCard(el, num){
  if(el==null) return;
  if(num==null){ el.classList.add("back"); el.querySelector(".cnum").textContent=""; el.style.backgroundImage = CARD_ART.back?("url("+CARD_ART.back+")"):""; }
  else { el.classList.remove("back"); el.querySelector(".cnum").textContent=String(num); el.style.backgroundImage = CARD_ART.face?("url("+CARD_ART.face+")"):""; }
}
function stampNumber(grid, num, W, H){
  const s=String(num), digits=s.length;
  const baseW=digits*6-1, baseH=7;
  const scale=Math.max(1, Math.min(Math.floor((H-1)/baseH), Math.floor((W-1)/baseW)));
  const ox=Math.floor((W-baseW*scale)/2), oy=Math.floor((H-baseH*scale)/2);
  for(let k=0;k<digits;k++){ const pat=FONT[s[k]]||FONT["0"];
    for(let yy=0;yy<7;yy++) for(let xx=0;xx<5;xx++) if(pat[yy][xx]==="1")
      for(let sy=0;sy<scale;sy++) for(let sx=0;sx<scale;sx++){
        const X=ox+(k*6+xx)*scale+sx, Y=oy+yy*scale+sy;
        if(grid[Y]&&grid[Y][X]!=null) grid[Y][X]=1;
      }
  }
}
function buildPadGrid(W,H){
  const g=[]; for(let y=0;y<H;y++){ g[y]=[]; for(let x=0;x<W;x++) g[y][x]=0; }
  const n=oppNum(); if(n!=null) stampNumber(g, n, W, H);          // 중앙: 현재 차례가 보는 상대 숫자
  const maxRef=RULES.startChips;
  function gauge(colA,colB,chips,code){
    const fill=Math.round(H * Math.max(0,Math.min(1, chips/maxRef)));
    for(let y=H-1; y>=H-fill && y>=0; y--){ if(g[y]){ if(colA>=0&&colA<W)g[y][colA]=code; if(colB>=0&&colB<W)g[y][colB]=code; } }
  }
  gauge(0,1, G.chips[0], G.viewer===0?3:4);            // 좌: 0번 칩 (내 칩=초록 / 상대=노랑)
  gauge(W-1,W-2, G.chips[1], G.viewer===1?3:4);        // 우: 1번 칩
  return g;
}
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function drawPad(){
  const COLS=40, ROWS=22, W=cvs.clientWidth||cvs.width, H=cvs.clientHeight||cvs.height;
  cvs.width=W; cvs.height=H;
  const gx=W/COLS, gy=H/ROWS, r=Math.max(1.5, Math.min(gx,gy)*0.34);
  cx.clearRect(0,0,W,H);
  const grid=buildPadGrid(COLS,ROWS);
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const on=grid[y][x];
    cx.beginPath(); cx.arc(x*gx+gx/2, y*gy+gy/2, r, 0, Math.PI*2);
    cx.fillStyle = on===4 ? getCss("--pin-on") : on===3 ? getCss("--good") : on===1 ? getCss("--pin-num") : getCss("--pin-off");
    cx.fill();
  }
}

/* ---------- ⑨ 렌더 ---------- */
function renderSeats(){
  const sy=document.getElementById("seat-you"), sa=document.getElementById("seat-ai");
  sy.querySelector(".who").textContent = `${seatName(0)} · ${G.chips[0]}개`;
  sa.querySelector(".who").textContent  = `${seatName(1)} · ${G.chips[1]}개`;
  sy.classList.toggle("turn", G.turn===0 && !G.over && !G.handoff);
  sa.classList.toggle("turn", G.turn===1 && !G.over && !G.handoff);
  sy.classList.toggle("mine", G.viewer===0); sy.classList.toggle("opp", G.viewer!==0);
  sa.classList.toggle("mine", G.viewer===1); sa.classList.toggle("opp", G.viewer!==1);
}
function updateControls(){
  const p=G.turn, owe=curOwe(p), war=owe>0;
  const my = !G.over && !G.busy && !G.handoff && !isAI(p);
  document.querySelector("#a-call .lbl").textContent = war ? `콜 ${Math.min(owe,G.chips[p])}` : "체크";
  document.querySelector("#a-bet .lbl").textContent  = war ? "레이즈 +5" : "벳 5";
  document.getElementById("a-fold").disabled = !my;
  document.getElementById("a-call").disabled = !my;
  document.getElementById("a-bet").disabled  = !my || G.chips[p]<=0;
  document.getElementById("a-allin").disabled= !my || G.chips[p]<=0;
}
function render(){
  const v=G.viewer;
  document.getElementById("pot-num").textContent=String(G.pot);
  const reveal = (G.reveal && (v===0||v===1) && G.card[v]!=null);
  document.getElementById("mine-num").textContent = reveal ? String(G.card[v]) : "?";
  // 카드 슬롯: 상대=보이면 앞면+숫자(핸드오프 땐 뒷면), 내 카드=쇼다운 때만 앞면(공개 순간 살짝 뒤집힘)
  paintCard(elOpp, oppNum());
  const mineWasBack = elMine && elMine.classList.contains("back");
  paintCard(elMine, reveal ? G.card[v] : null);
  if(reveal && mineWasBack && elMine){ elMine.classList.add("pop"); setTimeout(()=>elMine&&elMine.classList.remove("pop"), 300); }
  renderSeats(); drawPad(); updateControls(); pushDevice(); sendResize();
}

let lastMsg="";
function setStatus(msg){ const s=document.getElementById("status"); s.className="status"; s.textContent=msg; lastMsg=msg; }
function setStatusCls(msg,cls){ const s=document.getElementById("status"); s.className="status"+(cls?(" "+cls):""); s.textContent=msg; lastMsg=msg; }
let bestVoice=null;
function pickVoice(){
  if(!window.speechSynthesis) return;
  const all=speechSynthesis.getVoices()||[];
  const ko=all.filter(v=>/ko(-|_)?KR/i.test(v.lang)||/korean|한국/i.test(v.name));
  const prefer=[/Heami/i,/SunHi/i,/InJoon/i,/Yuna/i,/Google.*(한국|korea)/i,/Microsoft.*(Neural|Online|Natural)/i,/Natural/i,/Neural/i,/Premium|Enhanced/i];
  for(const re of prefer){ const m=ko.find(v=>re.test(v.name)); if(m){ bestVoice=m; return; } }
  bestVoice = ko[0] || null;
}
if(window.speechSynthesis){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
const TTS_RATE=1.0;
let speakSafetyTimer=null;
function say(text, opts){
  if(opts===true || opts===false) opts={assertive:opts};
  opts=opts||{};
  if(opts.assertive){ const sr=document.getElementById("sr-live"); if(sr) sr.textContent=text; }
  const done = (typeof opts.onDone==="function") ? opts.onDone : null;
  try{
    if(window.speechSynthesis){
      if(!bestVoice) pickVoice();
      const u=new SpeechSynthesisUtterance(text);
      if(bestVoice) u.voice=bestVoice;
      u.lang="ko-KR"; u.rate=TTS_RATE; u.pitch=1.04; u.volume=1.0;
      let fired=false;
      const fin=()=>{ if(fired)return; fired=true; clearTimeout(speakSafetyTimer); if(done) done(); };
      u.onend=fin; u.onerror=fin;
      if(opts.interrupt) window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
      if(done){ clearTimeout(speakSafetyTimer); speakSafetyTimer=setTimeout(fin, 8000); }
      return;
    }
  }catch(e){}
  if(done) setTimeout(done, Math.min(4500, 1200 + (text?text.length:0)*110));
}
function narrate(msg, cls, then){ setStatusCls(msg, cls); say(msg, {onDone: then}); }

/* ---------- 사운드 / 햅틱 (WebAudio 합성 · 외부 파일 없음 · 동작별 구별음=청각 단서) ---------- */
const SND={ ctx:null, on:true, master:null };
function ac(){
  try{
    if(!SND.ctx){ const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return null;
      SND.ctx=new AC(); SND.master=SND.ctx.createGain(); SND.master.gain.value=0.42; SND.master.connect(SND.ctx.destination); }
    if(SND.ctx.state==="suspended") SND.ctx.resume();
  }catch(e){ return null; }
  return SND.ctx;
}
function tone(f,t0,dur,type,peak){ const c=SND.ctx; if(!c) return;
  const o=c.createOscillator(), g=c.createGain(); o.type=type||"sine"; o.frequency.setValueAtTime(f,t0);
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(peak||0.3,t0+0.008); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(SND.master); o.start(t0); o.stop(t0+dur+0.02); }
function slide(f1,f2,t0,dur,type,peak){ const c=SND.ctx; if(!c) return;
  const o=c.createOscillator(), g=c.createGain(); o.type=type||"sawtooth"; o.frequency.setValueAtTime(f1,t0); o.frequency.exponentialRampToValueAtTime(f2,t0+dur);
  g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(peak||0.25,t0+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(SND.master); o.start(t0); o.stop(t0+dur+0.02); }
function noise(t0,dur,peak,hp){ const c=SND.ctx; if(!c) return;
  const n=Math.max(1,Math.floor(c.sampleRate*dur)); const buf=c.createBuffer(1,n,c.sampleRate); const ch=buf.getChannelData(0);
  for(let i=0;i<n;i++) ch[i]=Math.random()*2-1;
  const s=c.createBufferSource(); s.buffer=buf; const f=c.createBiquadFilter(); f.type="highpass"; f.frequency.value=hp||2200;
  const g=c.createGain(); g.gain.setValueAtTime(peak||0.2,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  s.connect(f); f.connect(g); g.connect(SND.master); s.start(t0); s.stop(t0+dur+0.02); }
function vibe(p){ try{ if(SND.on && navigator.vibrate) navigator.vibrate(p); }catch(e){} }
function sfx(name){
  if(!SND.on) return;
  const c=ac(); if(!c) return; const t=c.currentTime;
  switch(name){
    case "deal":  noise(t,0.06,0.18,3000); noise(t+0.07,0.05,0.14,3500); noise(t+0.13,0.05,0.12,4200); break;
    case "check": tone(330,t,0.09,"sine",0.22); break;
    case "call":  noise(t,0.03,0.16,5000); tone(620,t,0.07,"triangle",0.18); noise(t+0.06,0.03,0.13,5000); break;
    case "bet":   noise(t,0.03,0.16,5000); tone(540,t,0.06,"triangle",0.18); tone(760,t+0.06,0.09,"sine",0.2); break;
    case "raise": noise(t,0.03,0.16,5000); tone(540,t,0.05,"triangle",0.18); tone(760,t+0.05,0.06,"sine",0.2); tone(960,t+0.11,0.09,"sine",0.2); break;
    case "allin": tone(80,t,0.16,"sine",0.5); tone(80,t+0.28,0.16,"sine",0.5);
                  slide(520,1150,t+0.5,0.5,"sawtooth",0.2); slide(1150,520,t+1.0,0.4,"sawtooth",0.18); vibe([90,60,90,60,260]); break;
    case "fold":  slide(420,150,t,0.28,"sine",0.22); vibe(40); break;
    case "reveal":noise(t,0.05,0.18,2500); tone(700,t+0.03,0.1,"triangle",0.2); break;
    case "win":   tone(523,t,0.12,"triangle",0.28); tone(659,t+0.1,0.12,"triangle",0.28); tone(784,t+0.2,0.18,"triangle",0.3); vibe([60,50,60]); break;
    case "lose":  tone(330,t,0.16,"sine",0.26); tone(247,t+0.14,0.22,"sine",0.24); vibe(120); break;
    case "draw":  tone(440,t,0.14,"sine",0.22); tone(440,t+0.16,0.14,"sine",0.2); break;
    case "overWin":  tone(523,t,0.14,"triangle",0.3); tone(659,t+0.12,0.14,"triangle",0.3); tone(784,t+0.24,0.14,"triangle",0.3); tone(1047,t+0.36,0.28,"triangle",0.32); vibe([80,60,80,60,180]); break;
    case "overLose": slide(420,120,t,0.62,"sine",0.26); vibe(200); break;
  }
}
function toggleSound(){ SND.on=!SND.on; if(SND.on) ac(); updateSoundBtn(); setStatus(SND.on?"소리를 켰어요.":"소리를 껐어요."); }
function updateSoundBtn(){ const b=document.getElementById("snd-btn"); if(!b) return;
  b.classList.toggle("on", SND.on); b.setAttribute("aria-label", SND.on?"소리 끄기":"소리 켜기");
  b.querySelector(".on-ico").style.display = SND.on?"block":"none";
  b.querySelector(".off-ico").style.display = SND.on?"none":"block"; }

/* ---------- 오버레이 / 메뉴 ---------- */
let ovlAction=null;
function showOvl(title,msg,btn,action){
  document.getElementById("ovl-title").innerHTML=title;
  document.getElementById("ovl-msg").textContent=msg;
  document.getElementById("ovl-btn").textContent=btn||"계속";
  ovlAction=action; document.getElementById("ovl").hidden=false;
  document.getElementById("ovl-btn").focus();
}
function hideOvl(){ document.getElementById("ovl").hidden=true; }
function showMenu(){ G.over=true; G.busy=true; silence(); document.getElementById("menu").hidden=false; document.getElementById("m-easy").focus(); }
function hideMenu(){ document.getElementById("menu").hidden=true; }
function showRules(){
  hideMenu();
  showOvl("인디언 포커 규칙",
    "• 내 카드는 못 보고, 상대 숫자만 보여요.\n"+
    "• 시작 칩 30개, 매 판 1개 의무 베팅.\n"+
    "• 베팅은 5개 단위.\n"+
    "• 평화: 체크 / 벳 / 올인 / 다이\n"+
    "• 전투(상대가 걸면): 콜 / 레이즈+5 / 올인 / 다이\n"+
    "• 카드 오픈 시 더 높은 숫자가 판돈을 가져가요.\n"+
    "• 칩이 0이 되면 게임 종료.",
    "확인", ()=> showMenu());
}
document.getElementById("ovl-btn").addEventListener("click",()=>{ const a=ovlAction; ovlAction=null; hideOvl(); if(a)a(); });
document.getElementById("m-easy").addEventListener("click",()=>startGame("easy"));
document.getElementById("m-hard").addEventListener("click",()=>startGame("hard"));
document.getElementById("m-2p").addEventListener("click",()=>startGame("2p"));
document.getElementById("m-rules").addEventListener("click", showRules);

/* ---------- 입력 ---------- */
function canAct(){ return !G.over && !G.busy && !G.handoff && !isAI(G.turn); }
function actF1(){ if(canAct()) act(G.turn,"fold"); }
function actF2(){ if(canAct()) act(G.turn, curOwe(G.turn)>0?"call":"check"); }
function actF3(){ if(canAct()) act(G.turn, curOwe(G.turn)>0?"raise":"bet"); }
function actF4(){ if(canAct()) act(G.turn,"allin"); }
function readSituation(){
  if(G.over || G.handoff){ say("아직 차례가 시작되지 않았어요.", {assertive:true, interrupt:true}); return; }
  const p=G.turn, owe=curOwe(p);
  say(`상대 카드 ${G.card[1-p]}. ${seatName(p)} 칩 ${G.chips[p]}개, 상대 ${G.chips[1-p]}개. 판돈 ${G.pot}개. ${owe>0?`상대가 ${owe}개 걸었어요.`:"평화 상태."}`, {assertive:true, interrupt:true});
}
document.getElementById("a-fold").addEventListener("click", actF1);
document.getElementById("a-call").addEventListener("click", actF2);
document.getElementById("a-bet").addEventListener("click", actF3);
document.getElementById("a-allin").addEventListener("click", actF4);
document.getElementById("speak").addEventListener("click", readSituation);
document.getElementById("pad-btn").addEventListener("click", connectPad);
document.getElementById("snd-btn").addEventListener("click", toggleSound);
document.getElementById("exit").addEventListener("click", doExit);

window.addEventListener("keydown",(e)=>{
  const mO=document.getElementById("menu"), oO=document.getElementById("ovl");
  if((mO && !mO.hidden) || (oO && !oO.hidden)) return;
  const k=e.key;
  if(k==="F1"||k==="1"){ actF1(); e.preventDefault(); }
  else if(k==="F2"||k==="2"){ actF2(); e.preventDefault(); }
  else if(k==="F3"||k==="3"){ actF3(); e.preventDefault(); }
  else if(k==="F4"||k==="4"){ actF4(); e.preventDefault(); }
  else if(k===" "||k==="ArrowLeft"||k==="ArrowRight"){ readSituation(); e.preventDefault(); }
});
window.POKER_fireKey=function(key){
  if(key==="F1") actF1();
  else if(key==="F2") actF2();
  else if(key==="F3") actF3();
  else if(key==="F4") actF4();
  else if(key==="PAN_LEFT"||key==="PAN_RIGHT"||key==="PAN_ALL") readSituation();
};

/* ---------- 임베드 규격 ---------- */
const params=new URLSearchParams(location.search);
const EMBED = params.get("embed")==="1";
if(EMBED) document.body.classList.add("embed");
function postToParent(obj){ try{ if(window.parent && window.parent!==window) window.parent.postMessage(Object.assign({source:"dotarcade"},obj),"*"); }catch(e){} }
let lastH=0;
function sendResize(){ const h=Math.ceil(document.documentElement.scrollHeight); if(Math.abs(h-lastH)>4){ lastH=h; postToParent({type:"resize", height:h}); } }
function silence(){ try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){} clearTimeout(speakSafetyTimer); }
function doExit(){ G.over=true; G.busy=true; silence(); if(EMBED){ postToParent({type:"exit"}); } else { showMenu(); } }
window.addEventListener("message",(e)=>{ const d=e.data; if(d&&d.type==="exit") doExit(); });
document.addEventListener("visibilitychange",()=>{ if(document.hidden && G && !G.over){ G.over=true; G.busy=true; silence(); } });
window.addEventListener("pagehide",()=>{ try{ G.over=true; }catch(e){} silence(); });
let rAF=0;
new ResizeObserver(()=>{ cancelAnimationFrame(rAF); rAF=requestAnimationFrame(()=>{ drawPad(); sendResize(); }); }).observe(document.body);

/* ---------- 닷패드 (Web Bluetooth) ---------- */
const PAD = { sdk:null, dev:null, mod:null, ready:false, lastRows:[], lastSentRow:-1, ka:null };
function cellByte(grid, cellRow, cellCol){
  let b=0;
  for(let cx2=0;cx2<2;cx2++) for(let cy=0;cy<4;cy++){
    const X=cellCol*2+cx2, Y=cellRow*4+cy;
    if(grid[Y] && grid[Y][X]) b |= 1 << (cy + cx2*4);
  }
  return b;
}
function rowHex(grid, cellRow, cols){ let hex=""; for(let c=0;c<cols;c++) hex += cellByte(grid,cellRow,c).toString(16).padStart(2,"0"); return hex; }
function pushDevice(){
  if(!PAD.ready || !PAD.dev || !PAD.sdk || !PAD.mod) return;
  const cols=PAD.dev.numberCellColumns|0, rows=PAD.dev.numberCellRows|0;
  if(cols<=0 || rows<=0) return;
  const grid=buildPadGrid(cols*2, rows*4);
  for(let r=0;r<rows;r++){ const hex=rowHex(grid,r,cols);
    if(PAD.lastRows[r]!==hex){ PAD.lastRows[r]=hex;
      try{ PAD.sdk.displayLineData(r,0,hex,PAD.mod.DisplayMode.GraphicMode,PAD.dev); PAD.lastSentRow=r; }catch(e){}
    }
  }
}
function startKeepAlive(){ stopKeepAlive(); PAD.ka=setInterval(()=>{
  if(PAD.ready && PAD.dev && PAD.lastSentRow>=0 && PAD.lastRows[PAD.lastSentRow]!=null){
    try{ PAD.sdk.displayLineData(PAD.lastSentRow,0,PAD.lastRows[PAD.lastSentRow],PAD.mod.DisplayMode.GraphicMode,PAD.dev); }catch(e){}
  }
},1000); }
function stopKeepAlive(){ if(PAD.ka){ clearInterval(PAD.ka); PAD.ka=null; } }
function updatePadBtn(){ const b=document.getElementById("pad-btn"); if(!b) return;
  b.classList.toggle("on", !!PAD.ready); b.setAttribute("aria-label", PAD.ready?"닷패드 연결됨 (눌러서 해제)":"닷패드 연결");
}
async function connectPad(){
  if(PAD.ready){ try{ PAD.sdk.disconnect(PAD.dev); }catch(e){} PAD.ready=false; stopKeepAlive(); updatePadBtn(); setStatus("닷패드 연결을 해제했어요."); return; }
  try{
    setStatus("닷패드 검색 중… 페어링 창에서 기기를 선택하세요.");
    const mod = await import("./dotpad-sdk/DotPadSDK-3.0.0.js");
    PAD.mod = mod;
    const device = await new mod.DotPadScanner().startBleScan();
    if(!device){ setStatus("연결을 취소했어요."); return; }
    PAD.sdk = new mod.DotPadSDK();
    const dev = await PAD.sdk.connectBleDevice(device);
    if(!dev){ setStatus("닷패드 연결에 실패했어요. 다시 시도해 주세요."); return; }
    PAD.dev = dev; PAD.lastRows=[]; PAD.lastSentRow=-1;
    PAD.sdk.setCallBack(
      (d, code)=>{
        if(code===mod.DataCodes.BoardInfo || code===mod.DataCodes.Connected){
          PAD.ready=true; PAD.lastRows=[]; updatePadBtn(); pushDevice(); startKeepAlive();
        } else if(code===mod.DataCodes.Disconnected){
          PAD.ready=false; stopKeepAlive(); updatePadBtn(); setStatus("닷패드 연결이 끊어졌어요.");
        }
      },
      (d, key)=>{
        if(key===mod.KeyCodes.PanningLeft || key===mod.KeyCodes.PanningRight || key===mod.KeyCodes.PanningAll) readSituation();
        else if(key===mod.KeyCodes.KeyFunction1) actF1();
        else if(key===mod.KeyCodes.KeyFunction2) actF2();
        else if(key===mod.KeyCodes.KeyFunction3) actF3();
        else if(key===mod.KeyCodes.KeyFunction4) actF4();
      }
    );
    setStatus("닷패드 연결됨! F1 다이, F2 체크·콜, F3 벳·레이즈, F4 올인, 패닝키 상황 듣기.");
    updatePadBtn();
  }catch(e){ setStatus("닷패드 오류: " + (e && e.message ? e.message : String(e))); }
}

/* ---------- 시작 ---------- */
window.addEventListener("load",()=>{ postToParent({type:"ready"}); showMenu(); });
