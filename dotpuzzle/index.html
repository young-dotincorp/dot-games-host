    render();
    speak(n === 0 ? 'Erased' : ('Set to ' + n));
  }
  function sudokuCheck() {
    const s = state.sudoku;
    let wrong = 0, empty = 0;
    for (let r=0; r<s.N; r++) for (let c=0; c<s.N; c++) {
      if (s.grid[r][c] === 0) empty++;
      else if (s.grid[r][c] !== s.solution[r][c]) wrong++;
    }
    if (empty === 0 && wrong === 0) {
      SFX.checkOk();
      toast('☆ Solved!', 3000);
      speak('Solved.');
    } else if (wrong === 0) {
      SFX.checkPartial();
      toast(empty + ' cells to go');
      speak(empty + ' cells remaining.');
    } else {
      SFX.checkBad();
      toast(wrong + ' wrong · ' + empty + ' empty');
      speak(wrong + ' wrong, ' + empty + ' empty.');
    }
  }
  function sudokuReset() {
    state.sudoku = null;
    initSudoku();
    render();
  }

  // ============================================================
  // MINESWEEPER
  // ============================================================
  function initMinesweeper() {
    const cfg = MS_CFG[state.difficulty.minesweeper];
    const N = cfg.N, MINES = cfg.mines;
    const grid = Array.from({length: N}, () => Array(N).fill(0));
    const revealed = Array.from({length: N}, () => Array(N).fill(false));
    const flagged = Array.from({length: N}, () => Array(N).fill(false));
    state.minesweeper = {
      N, MINES,
      grid, revealed, flagged,
      cursor: { r: 0, c: 0 },
      gameOver: false, won: false,
      firstClick: true, // 첫 클릭 안전 보장
    };
  }

  // 첫 클릭 위치 안전하게: 그 셀과 주변 8칸 제외하고 mine 배치
  function msPlaceMines(safeR, safeC) {
    const s = state.minesweeper;
    const safe = new Set();
    for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
      safe.add((safeR+dr) + ',' + (safeC+dc));
    }
    let placed = 0;
    while (placed < s.MINES) {
      const r = Math.floor(Math.random() * s.N);
      const c = Math.floor(Math.random() * s.N);
      if (s.grid[r][c] !== -1 && !safe.has(r + ',' + c)) {
        s.grid[r][c] = -1; placed++;
      }
    }
    for (let r=0; r<s.N; r++) for (let c=0; c<s.N; c++) {
      if (s.grid[r][c] === -1) continue;
      let cnt = 0;
      for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
        const nr = r+dr, nc = c+dc;
        if (nr<0||nr>=s.N||nc<0||nc>=s.N) continue;
        if (s.grid[nr][nc] === -1) cnt++;
      }
      s.grid[r][c] = cnt;
    }
  }

  // Safe hint — 안전한 셀 한 개 음성으로 안내
  function msSafeHint() {
    const s = state.minesweeper;
    if (s.firstClick) { toast('Tap any cell to start'); speak('Tap any cell to start.'); return; }
    // 가려져 있고 지뢰가 아닌 셀 중 하나 선택
    const safeHidden = [];
    for (let r=0; r<s.N; r++) for (let c=0; c<s.N; c++) {
      if (!s.revealed[r][c] && !s.flagged[r][c] && s.grid[r][c] !== -1) {
        safeHidden.push({r, c});
      }
    }
    if (safeHidden.length === 0) { toast('No safe hidden cells left'); return; }
    const pick = safeHidden[Math.floor(Math.random() * safeHidden.length)];
    s.cursor.r = pick.r; s.cursor.c = pick.c;
    SFX.safeHint();
    const msg = `Safe cell: row ${pick.r+1} column ${pick.c+1}.`;
    toast(msg, 3000); speak(msg);
    render();
  }
  window.msSafeHint = msSafeHint;

  function renderMinesweeper() {
    const s = state.minesweeper;
    let cellsHtml = '';
    for (let r=0; r<s.N; r++) for (let c=0; c<s.N; c++) {
      const focused = (r === s.cursor.r && c === s.cursor.c) ? 'focused' : '';
      let cls = `ms-cell ${focused}`;
      let label = '';
      if (s.revealed[r][c]) {
        if (s.grid[r][c] === -1) { cls += ' mine'; }
        else {
          cls += ' revealed n' + s.grid[r][c];
          if (s.grid[r][c] > 0) label = s.grid[r][c];
        }
      } else if (s.flagged[r][c]) {
        cls += ' flagged';
      }
      const msState = s.revealed[r][c] ? (s.grid[r][c] === -1 ? 'mine' : s.grid[r][c] === 0 ? 'safe empty' : `${s.grid[r][c]} mines nearby`) : (s.flagged[r][c] ? 'flagged' : 'hidden');
      const msLabel = `Row ${r+1} column ${c+1}, ${msState}`;
      cellsHtml += `<div class="${cls}" role="gridcell" aria-label="${msLabel}" onclick="msClick(${r},${c})" oncontextmenu="event.preventDefault();msFlag(${r},${c});return false">${label}</div>`;
    }
    const flagsLeft = s.MINES - s.flagged.flat().filter(Boolean).length;

    $('screen').innerHTML = `
      ${renderHeader('Find the mines', `${s.N} × ${s.N} · ${s.MINES} mines · Row ${s.cursor.r+1}, Col ${s.cursor.c+1}`, `Stage 2 · Minesweeper · ${DIFF_LABEL[state.difficulty.minesweeper]}`)}
      <div class="ms-status">
        <span>Mines: <b>${s.MINES}</b></span>
        <span>Flags left: <b>${flagsLeft}</b></span>
        <span>${s.gameOver ? (s.won ? '☆ Won' : '☠ Lost') : (s.firstClick ? 'Tap to start' : 'Playing')}</span>
      </div>
      <div class="tools-bar">
        <button class="tool-btn" onclick="msSafeHint()"><span class="ico">💡</span>Safe hint</button>
        <button class="tool-btn" onclick="msReadAround()"><span class="ico">📢</span>Read around</button>
        <button class="tool-btn" onclick="state.minesweeper=null;initMinesweeper();render()"><span class="ico">↺</span>New game</button>
        <button class="tool-btn" onclick="announceContextHelp()"><span class="ico">?</span>Help</button>
      </div>
      <div class="ms-grid" id="ms-grid" role="grid" tabindex="0" aria-label="Minesweeper ${s.N} by ${s.N} grid. Arrow keys to navigate, Space to reveal, F to flag." aria-rowcount="${s.N}" aria-colcount="${s.N}" style="grid-template-columns: repeat(${s.N}, 1fr)">${cellsHtml}</div>
      <div class="key-hints"><b>Tap</b> reveal · <b>right-click</b> flag · Dot Pad: <b>F1/F2</b> row · <b>Pan ◀▶</b> col · <b>F3</b> reveal · <b>F4</b> flag · <b>Pan ⊙</b> board summary</div>
      ${renderDotpadPreview()}
    `;
  }

  // Minesweeper: read 8 cells around cursor
  function msReadAround() {
    const s = state.minesweeper;
    const dirs = [
      ['north-west', -1, -1], ['north', -1, 0], ['north-east', -1, 1],
      ['west', 0, -1], ['east', 0, 1],
      ['south-west', 1, -1], ['south', 1, 0], ['south-east', 1, 1],
    ];
    const around = dirs.map(([name, dr, dc]) => {
      const nr = s.cursor.r + dr, nc = s.cursor.c + dc;
      if (nr<0||nr>=s.N||nc<0||nc>=s.N) return null;
      let st;
      if (s.revealed[nr][nc]) {
        const v = s.grid[nr][nc];
        st = v === -1 ? 'mine' : v === 0 ? 'empty' : v + ' nearby';
      } else st = s.flagged[nr][nc] ? 'flagged' : 'hidden';
      return name + ' ' + st;
    }).filter(Boolean);
    const msg = around.join('. ');
    toast(msg, 5000); speak(msg);
  }
  window.msReadAround = msReadAround;

  function msClick(r, c) {
    const s = state.minesweeper;
    if (s.gameOver) return;
    s.cursor.r = r; s.cursor.c = c;
    // No-op error: clicking on a flagged cell or already-revealed cell
    if (s.flagged[r][c]) {
      SFX.error(); speak('Flagged. Unflag first.');
      render(); return;
    }
    if (s.revealed[r][c]) {
      SFX.error(); speak('Already revealed.');
      render(); return;
    }
    // First click safety: place mines avoiding this cell + neighbors
    if (s.firstClick) {
      msPlaceMines(r, c);
      s.firstClick = false;
    }
    if (s.grid[r][c] === -1) {
      for (let r2=0; r2<s.N; r2++) for (let c2=0; c2<s.N; c2++)
        if (s.grid[r2][c2] === -1) s.revealed[r2][c2] = true;
      s.gameOver = true; s.won = false;
      SFX.mine();
      toast('☠ Boom!', 2000); speak('Mine. Game over.');
      render(); return;
    }
    // Track how many cells opened by the flood for voice summary (Tier 1)
    const openedCells = [];
    msFlood(r, c, openedCells);
    if (s.grid[r][c] === 0) SFX.reveal(); else SFX.revealN(s.grid[r][c]);
    msCheckWin();
    render();
    // Tier 1: announce flood scope when 0-cell chain reveals multiple cells
    if (s.grid[r][c] === 0 && openedCells.length > 1) {
      speak('Row ' + (r+1) + ' col ' + (c+1) + ' safe. Chain opened ' + openedCells.length + ' cells.');
    } else {
      speak('Row ' + (r+1) + ' col ' + (c+1) + ': ' + (s.grid[r][c] === 0 ? 'safe' : s.grid[r][c] + ' nearby'));
    }
  }
  function msFlood(r, c, opened) {
    const s = state.minesweeper;
    if (r<0||r>=s.N||c<0||c>=s.N) return;
    if (s.revealed[r][c] || s.flagged[r][c]) return;
    if (s.grid[r][c] === -1) return;
    s.revealed[r][c] = true;
    if (opened) opened.push([r, c]);
    if (s.grid[r][c] === 0) {
      for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++)
        if (dr || dc) msFlood(r+dr, c+dc, opened);
    }
  }
  function msFlag(r, c) {
    const s = state.minesweeper;
    if (s.gameOver) { SFX.error(); return; }
    if (s.revealed[r][c]) {
      SFX.error(); speak('Cannot flag a revealed cell.');
      return;
    }
    s.flagged[r][c] = !s.flagged[r][c];
    s.cursor.r = r; s.cursor.c = c;
    if (s.flagged[r][c]) SFX.flag(); else SFX.unflag();
    render();
    speak(s.flagged[r][c] ? 'Flagged' : 'Unflagged');
  }
  function msCheckWin() {
    const s = state.minesweeper;
    let safeCells = 0, safeRevealed = 0;
    for (let r=0; r<s.N; r++) for (let c=0; c<s.N; c++) {
      if (s.grid[r][c] !== -1) {
        safeCells++;
        if (s.revealed[r][c]) safeRevealed++;
      }
    }
    if (safeCells === safeRevealed) {
      s.gameOver = true; s.won = true;
      SFX.win();
      toast('☆ Solved!', 3000); speak('Solved. Congratulations.');
    }
  }

  // ============================================================
  // NONOGRAM
  // ============================================================
  // Nonogram target — from NONO_BY_DIFF based on difficulty

  function computeHints(grid, axis) {
    // axis: 'row' or 'col'
    const N = grid.length;
    const hints = [];
    if (axis === 'row') {
      for (let r=0; r<N; r++) {
        const line = grid[r];
        const groups = [];
        let cur = 0;
        for (let c=0; c<N; c++) {
          if (line[c]) cur++;
          else if (cur) { groups.push(cur); cur = 0; }
        }
        if (cur) groups.push(cur);
        hints.push(groups.length ? groups : [0]);
      }
    } else {
      for (let c=0; c<N; c++) {
        const groups = [];
        let cur = 0;
        for (let r=0; r<N; r++) {
          if (grid[r][c]) cur++;
          else if (cur) { groups.push(cur); cur = 0; }
        }
        if (cur) groups.push(cur);
        hints.push(groups.length ? groups : [0]);
      }
    }
    return hints;
  }

  function initNonogram() {
    if (state.nonogram) return;
    const target = NONO_BY_DIFF[state.difficulty.nonogram];
    const N = target.length;
    state.nonogram = {
      N,
      target,
      state: Array.from({length: N}, () => Array(N).fill(0)),
      rowHints: computeHints(target, 'row'),
      colHints: computeHints(target, 'col'),
      cursor: { r: 0, c: 0 },
      completedRows: new Set(),
      completedCols: new Set(),
    };
  }

  function renderNonogram() {
    const s = state.nonogram;
    // Column hints
    let colHtml = '';
    for (let c=0; c<s.N; c++) {
      const hints = s.colHints[c].join(' ');
      colHtml += `<div class="nono-hint-cell col">${hints.replace(/ /g, '<br/>')}</div>`;
    }
    // Row hints
    let rowHtml = '';
    for (let r=0; r<s.N; r++) {
      const hints = s.rowHints[r].join(' ');
      rowHtml += `<div class="nono-hint-cell row">${hints}</div>`;
    }
    // Grid
    let cellsHtml = '';
    for (let r=0; r<s.N; r++) for (let c=0; c<s.N; c++) {
      const v = s.state[r][c];
      const focused = (r === s.cursor.r && c === s.cursor.c) ? 'focused' : '';
      const cls = `nono-cell ${v===1?'filled':''} ${v===2?'x':''} ${focused}`;
      const nonoState = v === 1 ? 'filled' : v === 2 ? 'x marked' : 'empty';
      const nonoLabel = `Row ${r+1} column ${c+1}, ${nonoState}. Row hint ${s.rowHints[r].join(' ')}. Column hint ${s.colHints[c].join(' ')}.`;
      cellsHtml += `<div class="${cls}" role="gridcell" aria-label="${nonoLabel}" onclick="nonoClick(${r},${c})" oncontextmenu="event.preventDefault();nonoX(${r},${c});return false"></div>`;
    }

    $('screen').innerHTML = `
      ${renderHeader('Reveal the picture', `${s.N} × ${s.N} · Row ${s.cursor.r+1}, Col ${s.cursor.c+1}`, `Stage 3 · Nonogram · ${DIFF_LABEL[state.difficulty.nonogram]}`)}
      <div class="tools-bar">
        <button class="tool-btn" onclick="nonoReadHints()"><span class="ico">📢</span>Read hints</button>
        <button class="tool-btn" onclick="nonoProgress()"><span class="ico">📊</span>Progress</button>
        <button class="tool-btn" onclick="nonoCheck()"><span class="ico">✓</span>Check</button>
        <button class="tool-btn" onclick="announceContextHelp()"><span class="ico">?</span>Help</button>
      </div>
      <div class="key-hints"><b>Tap</b> fill · <b>right-click</b> mark X · <b>F3</b> fill · <b>F4</b> mark</div>
      <div class="nono-wrap" style="grid-template-columns: 80px repeat(${s.N}, 1fr)">
        <div class="nono-hint-cell" style="grid-row:1;grid-column:1"></div>
        ${[...Array(s.N).keys()].map(c => `<div class="nono-hint-cell col" style="grid-row:1;grid-column:${c+2}">${s.colHints[c].join('<br/>')}</div>`).join('')}
        ${[...Array(s.N).keys()].map(r => `<div class="nono-hint-cell row" style="grid-row:${r+2};grid-column:1">${s.rowHints[r].join(' ')}</div>`).join('')}
        <div class="nono-grid-area" role="grid" tabindex="0" aria-label="Nonogram ${s.N} by ${s.N} grid. Arrow keys to navigate, Space to fill, F to X mark." aria-rowcount="${s.N}" aria-colcount="${s.N}" style="grid-row:2/span ${s.N};grid-column:2/span ${s.N};display:grid;grid-template-columns:repeat(${s.N},1fr);grid-template-rows:repeat(${s.N},1fr)">${cellsHtml}</div>
      </div>
      <div class="action-bar">
        <button class="primary-btn" onclick="nonoCheck()">Check</button>
        <button class="ghost-btn" onclick="state.nonogram=null;initNonogram();render()">Reset</button>
      </div>
      ${renderDotpadPreview()}
    `;
  }

  function nonoClick(r, c) {
    const s = state.nonogram;
    s.cursor.r = r; s.cursor.c = c;
    s.state[r][c] = s.state[r][c] === 1 ? 0 : 1;
    if (s.state[r][c] === 1) SFX.fill(); else SFX.unfill();
    nonoCheckLineComplete(r, c);
    render();
    speak(s.state[r][c] === 1 ? 'Filled' : 'Empty');
  }

  // 행/열이 정답과 일치하면 자동 음성 알림 (한 번만)
  function nonoCheckLineComplete(r, c) {
    const s = state.nonogram;
    // Row r 체크
    if (!s.completedRows.has(r)) {
      let rowOk = true;
      for (let cc=0; cc<s.N; cc++) {
        if ((s.state[r][cc] === 1) !== (s.target[r][cc] === 1)) { rowOk = false; break; }
      }
      if (rowOk) {
        s.completedRows.add(r);
        SFX.lineComplete();
        setTimeout(() => speak(`Row ${r+1} complete.`), 200);
        toast(`✓ Row ${r+1} complete`, 1500);
      }
    }
    // Col c 체크
    if (!s.completedCols.has(c)) {
      let colOk = true;
      for (let rr=0; rr<s.N; rr++) {
        if ((s.state[rr][c] === 1) !== (s.target[rr][c] === 1)) { colOk = false; break; }
      }
      if (colOk) {
        s.completedCols.add(c);
        SFX.lineComplete();
        setTimeout(() => speak(`Column ${c+1} complete.`), 500);
        toast(`✓ Column ${c+1} complete`, 1500);
      }
    }
  }
  window.nonoCheckLineComplete = nonoCheckLineComplete;
  function nonoReadHints() {
    const s = state.nonogram;
    const rh = s.rowHints[s.cursor.r].join(' ');
    const ch = s.colHints[s.cursor.c].join(' ');
    const msg = `Row ${s.cursor.r+1} hint: ${rh}. Column ${s.cursor.c+1} hint: ${ch}.`;
    toast(msg, 4000); speak(msg);
  }
  function nonoProgress() {
    const s = state.nonogram;
    let correct = 0, total = 0;
    for (let r=0; r<s.N; r++) for (let c=0; c<s.N; c++) {
      if (s.target[r][c] === 1) {
        total++;
        if (s.state[r][c] === 1) correct++;
      }
    }
    const pct = total === 0 ? 0 : Math.round(100 * correct / total);
    const msg = `Progress: ${pct} percent. ${correct} of ${total} filled correctly.`;
    toast(msg, 3000); speak(msg);
  }
  window.nonoReadHints = nonoReadHints;
  window.nonoProgress = nonoProgress;

  function nonoX(r, c) {
    const s = state.nonogram;
    s.cursor.r = r; s.cursor.c = c;
    s.state[r][c] = s.state[r][c] === 2 ? 0 : 2;
    SFX.xMark();
    render();
    speak(s.state[r][c] === 2 ? 'X marked' : 'Cleared');
  }
  function nonoCheck() {
    const s = state.nonogram;
    let ok = true;
    for (let r=0; r<s.N; r++) for (let c=0; c<s.N; c++) {
      const expected = s.target[r][c] === 1;
      const actual = s.state[r][c] === 1;
      if (expected !== actual) { ok = false; }
    }
    if (ok) { SFX.win(); toast('☆ Picture revealed!', 3000); speak('Solved.'); }
    else { SFX.checkPartial(); toast('Not quite there'); speak('Not yet.'); }
  }

  // ============================================================
  // MAZE
  // ============================================================
  function initMaze() {
    const N = MAZE_BY_DIFF[state.difficulty.maze];
    // N은 홀수여야 함 (모두 홀수: 7, 11, 15)
    const grid = Array.from({length: N}, () => Array(N).fill(1));
    function carve(r, c) {
      grid[r][c] = 0;
      const dirs = [[-2,0],[2,0],[0,-2],[0,2]].sort(() => Math.random() - 0.5);
      for (const [dr, dc] of dirs) {
        const nr = r + dr, nc = c + dc;
        if (nr > 0 && nr < N-1 && nc > 0 && nc < N-1 && grid[nr][nc] === 1) {
          grid[r + dr/2][c + dc/2] = 0;
          carve(nr, nc);
        }
      }
    }
    carve(1, 1);
    state.maze = {
      N, grid,
      player: { r: 1, c: 1 },
      goal: { r: N-2, c: N-2 },
      won: false,
    };
  }

  function renderMaze() {
    const s = state.maze;
    let cellsHtml = '';
    for (let r=0; r<s.N; r++) for (let c=0; c<s.N; c++) {
      let cls = 'maze-cell';
      if (s.grid[r][c] === 1) cls += ' wall';
      if (s.player.r === r && s.player.c === c) cls += ' player';
      if (s.goal.r === r && s.goal.c === c) cls += ' goal';
      cellsHtml += `<div class="${cls}" role="gridcell"></div>`;
    }

    $('screen').innerHTML = `
      ${renderHeader('Navigate the maze', `${s.N} × ${s.N} · Player at row ${s.player.r+1}, col ${s.player.c+1}${s.won ? ' · ☆ Won!' : ''}`, `Stage 4 · Maze · ${DIFF_LABEL[state.difficulty.maze]}`)}
      <div class="tools-bar">
        <button class="tool-btn" onclick="mazeAutoStep()"><span class="ico">▶▶</span>Auto to fork</button>
        <button class="tool-btn" onclick="mazeDescribe()"><span class="ico">📢</span>Describe</button>
        <button class="tool-btn" onclick="announceContextHelp()"><span class="ico">?</span>Help</button>
      </div>
      <div class="key-hints"><b>F1</b> up · <b>F2</b> down · <b>Pan L</b> left · <b>Pan R</b> right · <b>Pan All</b> describe surroundings</div>
      <div class="maze-grid" role="grid" tabindex="0" aria-label="Maze ${s.N} by ${s.N}. Arrow keys to move player to goal." aria-rowcount="${s.N}" aria-colcount="${s.N}" style="grid-template-columns:repeat(${s.N},1fr)">${cellsHtml}</div>
      <div class="maze-controls">
        <button class="num-btn empty"></button>
        <button class="num-btn" onclick="mazeMove(-1, 0)">▲</button>
        <button class="num-btn empty"></button>
        <button class="num-btn" onclick="mazeMove(0, -1)">◀</button>
        <button class="num-btn" onclick="mazeMove(1, 0)">▼</button>
        <button class="num-btn" onclick="mazeMove(0, 1)">▶</button>
      </div>
      <div class="action-bar" style="margin-top:10px">
        <button class="primary-btn" onclick="state.maze=null;initMaze();render()">New Maze</button>
        <button class="ghost-btn" onclick="mazeDescribe()">Describe</button>
      </div>
      ${renderDotpadPreview()}
    `;
  }

  function mazeMove(dr, dc) {
    const s = state.maze;
    if (s.won) return;
    const nr = s.player.r + dr;
    const nc = s.player.c + dc;
    if (nr<0||nr>=s.N||nc<0||nc>=s.N) { SFX.wall(); return; }
    if (s.grid[nr][nc] === 1) { SFX.wall(); toast('Wall'); speak('Wall.'); return; }
    s.player.r = nr; s.player.c = nc;
    if (s.player.r === s.goal.r && s.player.c === s.goal.c) {
      s.won = true;
      SFX.goal();
      toast('☆ Reached the goal!', 3000); speak('Goal reached.');
    } else {
      SFX.step();
    }
    render();
    speak(['up','down','left','right'][dr === -1 ? 0 : dr === 1 ? 1 : dc === -1 ? 2 : 3] + (s.won ? '. Goal reached.' : '.'));
  }

  // 갈림길(2개 이상 출구) 또는 막다른 길까지 자동 이동
  function mazeAutoStep() {
    const s = state.maze;
    if (s.won) return;
    // 현재 진입 방향 추정: 이전 위치 기억
    let lastDr = 0, lastDc = 0;
    let steps = 0;
    while (steps < 50) {
      const exits = [];
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (const [dr, dc] of dirs) {
        const nr = s.player.r + dr, nc = s.player.c + dc;
        if (nr<0||nr>=s.N||nc<0||nc>=s.N) continue;
        if (s.grid[nr][nc] === 0) exits.push([dr, dc]);
      }
      // 이전 방향 빼고 남은 길
      const forward = exits.filter(([dr, dc]) => !(dr === -lastDr && dc === -lastDc));
      if (forward.length === 0) break; // 막다른 길
      if (forward.length >= 2 && steps > 0) break; // 갈림길
      const [dr, dc] = forward[0];
      s.player.r += dr; s.player.c += dc;
      lastDr = dr; lastDc = dc;
      steps++;
      if (s.player.r === s.goal.r && s.player.c === s.goal.c) {
        s.won = true;
        toast('☆ Reached the goal!', 3000); speak('Goal reached.');
        break;
      }
    }
    render();
    const msg = `Moved ${steps} steps. Row ${s.player.r+1}, col ${s.player.c+1}.`;
    if (!s.won) speak(msg);
  }
  window.mazeAutoStep = mazeAutoStep;

  function mazeDescribe() {
    const s = state.maze;
    const dirs = [
      ['up', -1, 0],['down', 1, 0],
      ['left', 0, -1],['right', 0, 1]
    ];
    const open = dirs.filter(([_, dr, dc]) => {
      const nr = s.player.r + dr, nc = s.player.c + dc;
      return nr>=0 && nr<s.N && nc>=0 && nc<s.N && s.grid[nr][nc] === 0;
    }).map(d => d[0]);
    const dist = Math.abs(s.goal.r - s.player.r) + Math.abs(s.goal.c - s.player.c);
    const msg = `Player at row ${s.player.r+1} column ${s.player.c+1}. Open: ${open.join(', ') || 'none'}. Goal ${dist} steps away.`;
    toast(msg, 3500);
    speak(msg);
  }

  // ============================================================
  // DOT PAD PREVIEW + ACTUAL DISPLAY
  // ============================================================
  // Each Dot Pad cell = 2 cols × 3 rows of dots = 6 dots / cell
  // Dot Pad has 60 cells (30 cols × 2 rows) for text mode,
  // OR 300 cells (30 × 10) for graphic mode.
  // For puzzles we use graphic mode — 30 cells wide × 10 cells tall.
  // We'll preview a 30×3 strip (just one row of the puzzle status).

  function renderDotpadPreview() {
    // Full 30 × 10 cell preview (2400 dots) — reflects actual graphic output
    const hex = (state.screen !== 'launcher') ? renderPuzzleAsGraphicHex() : '0'.repeat(600);
    let cellsHtml = '';
    for (let i = 0; i < DP_W * DP_H; i++) {
      const byte = parseInt(hex.substring(i*2, i*2+2), 16) || 0;
      let dotsHtml = '';
      // 8 dots per cell — show all 8 (standard 6 + 2 bottom for 8-dot mode)
      for (let b = 0; b < 8; b++) {
        const up = (byte >> b) & 1;
        dotsHtml += `<div class="dp-d d${b+1} ${up?'up':''}"></div>`;
      }
      cellsHtml += `<div class="dp-c">${dotsHtml}</div>`;
    }
    // Status text line (20 cells)
    const statusText = (state.screen !== 'launcher') ? renderStatusText() : 'DotPuzzle';
    return `
      <div class="dotpad-preview">
        <div class="dotpad-preview-label">DOT PAD PREVIEW · 30 × 10 cells · 2400 pins ${state.dotpadConnected ? '· LIVE' : '· simulated'}</div>
        <div class="dotpad-preview-grid full">${cellsHtml}</div>
        <div class="dotpad-text-line"><span class="tl-label">TEXT</span><span class="tl-content">${statusText}</span></div>
      </div>
    `;
  }



  // ============================================================
  // DOT PAD GEOMETRY (v0.4 — full-pad rendering)
  // 그래픽 영역: 30 cells wide × 10 cells tall = 300 cells × 8 dots = 2400 dots
  // 텍스트 라인: 20 cells separate (grade-1 ASCII braille)
  // ============================================================
  const DP_W = 30, DP_H = 10, DP_TEXT_CELLS = 20;

  // puzzle NxN → cellW × cellH (Dot Pad cells per puzzle cell), with offset to center
  function dpLayout(N, fillHeight) {
    // fillHeight=true → stretch vertically too (Nonogram/Sudoku); else proportional
    const cellW = Math.max(1, Math.min(8, Math.floor(DP_W / N)));
    let cellH;
    if (N <= 10) {
      cellH = Math.max(1, Math.min(cellW, Math.floor(DP_H / N)));
      // For square-ish puzzles, prefer matching cellH ≤ cellW since Dot Pad cells are taller (2x4)
    } else {
      cellH = 1; // viewport mode
    }
    const totalW = cellW * N;
    const totalH = cellH * Math.min(N, DP_H);
    const offsetX = Math.floor((DP_W - totalW) / 2);
    const offsetY = Math.floor((DP_H - totalH) / 2);
    return { cellW, cellH, offsetX, offsetY };
  }

  // Place a block at cell (col, row) of size (cellW, cellH) using a pattern
  // pattern can be: number (uniform), or 2D array [dy][dx] of bytes
  function dpSetBlock(cells, col, row, cellW, cellH, pattern) {
    for (let dy = 0; dy < cellH; dy++) {
      for (let dx = 0; dx < cellW; dx++) {
        const c = col + dx, r = row + dy;
        if (c < 0 || c >= DP_W || r < 0 || r >= DP_H) continue;
        let v;
        if (typeof pattern === 'number') v = pattern;
        else if (pattern[dy] && pattern[dy][dx] !== undefined) v = pattern[dy][dx];
        else v = 0;
        cells[r * DP_W + c] = v & 0xFF;
      }
    }
  }

  // Outline a block (perimeter dots) — used for cursor
  function dpOutline(cells, col, row, cellW, cellH, val) {
    if (cellW <= 1 && cellH <= 1) {
      // Single cell — set whole cell
      const c = col, r = row;
      if (c >= 0 && c < DP_W && r >= 0 && r < DP_H) cells[r * DP_W + c] |= val;
      return;
    }
    // Top + bottom rows
    for (let dx = 0; dx < cellW; dx++) {
      const c = col + dx;
      if (c < 0 || c >= DP_W) continue;
      if (row >= 0 && row < DP_H) cells[row * DP_W + c] |= 0x09; // dots 1+4 (top)
      const rb = row + cellH - 1;
      if (rb >= 0 && rb < DP_H && rb !== row) cells[rb * DP_W + c] |= 0x24; // dots 3+6 (bottom)
    }
    // Left + right columns
    for (let dy = 0; dy < cellH; dy++) {
      const r = row + dy;
      if (r < 0 || r >= DP_H) continue;
      const cl = col;
      if (cl >= 0 && cl < DP_W) cells[r * DP_W + cl] |= 0x07; // dots 1+2+3 (left col)
      const cr = col + cellW - 1;
      if (cr >= 0 && cr < DP_W && cr !== cl) cells[r * DP_W + cr] |= 0x38; // dots 4+5+6 (right col)
    }
  }

  // Convert dot-state byte (graphics: 6 bits dot1-6 + 2 extra dots 7-8) to hex string
  function dpCellsToHex(cells) {
    let hex = '';
    for (let i = 0; i < DP_W * DP_H; i++) {
      hex += (cells[i] & 0xFF).toString(16).padStart(2, '0').toUpperCase();
    }
    return hex;
  }

  // ============================================================
  // ASCII → Grade-1 braille hex (for 20-cell text line)
  // ============================================================
  const BRL_LETTER = {
    a:0x01, b:0x03, c:0x09, d:0x19, e:0x11, f:0x0B, g:0x1B, h:0x13, i:0x0A, j:0x1A,
    k:0x05, l:0x07, m:0x0D, n:0x1D, o:0x15, p:0x0F, q:0x1F, r:0x17, s:0x0E, t:0x1E,
    u:0x25, v:0x27, w:0x3A, x:0x2D, y:0x3D, z:0x35,
  };
  const BRL_PUNCT = { ' ':0x00, '.':0x32, ',':0x02, '-':0x24, '/':0x0C, ':':0x12, ';':0x06, '?':0x26, '!':0x16, '=':0x3F };
  const BRL_NUMERIC_PREFIX = 0x3C;
  const BRL_CAPITAL_PREFIX = 0x20;

  function asciiToBrailleHex(text, maxCells) {
    let cells = [];
    let numericMode = false;
    for (const ch of text) {
      if (cells.length >= maxCells) break;
      if (ch >= '0' && ch <= '9') {
        if (!numericMode) { cells.push(BRL_NUMERIC_PREFIX); numericMode = true; if (cells.length >= maxCells) break; }
        const idx = ch === '0' ? 9 : (ch.charCodeAt(0) - 48 - 1);
        const letter = 'abcdefghij'[idx];
        cells.push(BRL_LETTER[letter] || 0);
      } else if (ch >= 'A' && ch <= 'Z') {
        numericMode = false;
        cells.push(BRL_CAPITAL_PREFIX); if (cells.length >= maxCells) break;
        cells.push(BRL_LETTER[ch.toLowerCase()] || 0);
      } else if (ch >= 'a' && ch <= 'z') {
        numericMode = false;
        cells.push(BRL_LETTER[ch] || 0);
      } else {
        numericMode = false;
        cells.push(BRL_PUNCT[ch] !== undefined ? BRL_PUNCT[ch] : 0);
      }
    }
    // Pad to maxCells
    while (cells.length < maxCells) cells.push(0);
    return cells.slice(0, maxCells).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join('');
  }

  // ============================================================
  // DOT PAD ACTUAL DEVICE — graphic mode (multi-line)
  // ============================================================
  // Dot Pad graphic data: hex string, each byte = 1 cell (2×3 dot pattern).
  // 30 cols × 10 rows = 300 cells = 600 hex chars.
  function pushToDotpad() {
    if (!state.dotpadConnected || !window.DotPad) return;
    const hex = renderPuzzleAsGraphicHex();
    try {
      window.DotPad.sdk.displayGraphicData(hex);
    } catch(e) { console.warn('[DotPad] graphic push failed:', e); }
    // 20-cell 텍스트 라인 — 현재 상태 압축 표시
    try {
      const status = renderStatusText();
      const txtHex = asciiToBrailleHex(status, DP_TEXT_CELLS);
      if (window.DotPad.sdk.displayTextData) window.DotPad.sdk.displayTextData(txtHex);
    } catch(e) { console.warn('[DotPad] text push failed:', e); }
  }

  // ============================================================
  // 텍스트 라인 (20 cells = ~20 chars) status 생성
  // ============================================================
  function renderStatusText() {
    if (state.screen === 'launcher') return 'DotPuzzle';
    if (state.screen === 'sudoku') {
      const s = state.sudoku;
      const v = s.grid[s.cursor.r][s.cursor.c];
      return 'R' + (s.cursor.r+1) + 'C' + (s.cursor.c+1) + ' ' + (v || '-');
    }
    if (state.screen === 'minesweeper') {
      const s = state.minesweeper;
      let st;
      if (s.revealed[s.cursor.r][s.cursor.c]) {
        const v = s.grid[s.cursor.r][s.cursor.c];
        st = v === -1 ? 'mine' : v === 0 ? 'safe' : ('n' + v);
      } else st = s.flagged[s.cursor.r][s.cursor.c] ? 'flag' : 'hide';
      return 'R' + (s.cursor.r+1) + 'C' + (s.cursor.c+1) + ' ' + st;
    }
    if (state.screen === 'nonogram') {
      const s = state.nonogram;
      const v = s.state[s.cursor.r][s.cursor.c];
      const st = v === 1 ? 'fill' : v === 2 ? 'x' : 'mt';
      return 'R' + (s.cursor.r+1) + 'C' + (s.cursor.c+1) + ' ' + st;
    }
    if (state.screen === 'maze') {
      const s = state.maze;
      return 'R' + (s.player.r+1) + 'C' + (s.player.c+1) + (s.won ? ' WIN' : '');
    }
    return '';
  }
  window.renderStatusText = renderStatusText;


  // ============================================================
  // BRAILLE NUMERIC patterns (Sudoku / Minesweeper digits)
  // 점자 숫자 = numeric prefix ⠼ (0x3C) + letter a-j for 1-0
  // ============================================================
  const BRL_NUM_PREFIX = 0x3C; // ⠼
  const BRL_NUM = {
    1: 0x01, 2: 0x03, 3: 0x09, 4: 0x19, 5: 0x11,
    6: 0x0B, 7: 0x1B, 8: 0x13, 9: 0x0A, 0: 0x1A
  };

  // Sudoku 사이즈별 Dot Pad 레이아웃 (cellW × cellH + 박스 divider 위치)
  // vDivs: 박스 경계가 cells[c]와 cells[c+1] 사이에 들어가는 column index들
  // hDivs: 같은 방식 row
  const SUDOKU_LAYOUT = {
    // divThick = 박스 divider 두께 (cells). 2면 더 명확한 그리드 + 닷패드 전체 채움
    4: { cellW: 7, cellH: 2, vDivs: [1], hDivs: [1], divThick: 2 },  // 4*7+2=30W, 4*2+2=10H — fills entire 30×10
    6: { cellW: 4, cellH: 1, vDivs: [2], hDivs: [1, 3], divThick: 2 },  // 6*4+2=26W, 6+4=10H — fills 10 rows
    9: { cellW: 3, cellH: 1, vDivs: [2, 5], hDivs: [], divThick: 1 },  // 9*3+2=29W, 9H — 2-thick면 31열로 over
  };

  // Build 30x10 grid hex from current puzzle — FULL PAD utilization
  // Each puzzle cell expands to (cellW × cellH) Dot Pad cells based on puzzle size
  function renderPuzzleAsGraphicHex() {
    const cells = new Array(DP_W * DP_H).fill(0);

    // ─── Sudoku ────────────────────────────────────────────
    if (state.screen === 'sudoku') {
      const s = state.sudoku;
      const L = SUDOKU_LAYOUT[s.N] || SUDOKU_LAYOUT[9];
      const { cellW, cellH, vDivs, hDivs, divThick } = L;
      const dt = divThick || 1;
      const totalW = s.N * cellW + vDivs.length * dt;
      const totalH = s.N * cellH + hDivs.length * dt;
      const ox = Math.max(0, Math.floor((DP_W - totalW) / 2));
      const oy = Math.max(0, Math.floor((DP_H - totalH) / 2));

      // 각 puzzle 셀의 실제 Dot Pad 위치 계산 (divider 누적 offset)
      function vOff(c) { return vDivs.filter(d => c > d).length * dt; }
      function hOff(r) { return hDivs.filter(d => r > d).length * dt; }

      // 1) 각 셀 — 점자 숫자 (numeric prefix + digit letter)
      for (let r = 0; r < s.N; r++) {
        for (let c = 0; c < s.N; c++) {
          const v = s.grid[r][c];
          const dcol = ox + c * cellW + vOff(c);
          const drow = oy + r * cellH + hOff(r);
          const padX = Math.floor((cellW - 2) / 2);
          const padY = Math.floor((cellH - 1) / 2);
          const ddc = dcol + padX;
          const ddr = drow + padY;
          if (v && BRL_NUM[v] !== undefined) {
            // 디지트 — numeric prefix + letter, cellW 안에서 가로/세로 중앙
            if (ddr < DP_H) {
              if (ddc < DP_W) cells[ddr * DP_W + ddc] = BRL_NUM_PREFIX;
              if (ddc + 1 < DP_W) cells[ddr * DP_W + ddc + 1] = BRL_NUM[v];
            }
            // Given underline 제거 (v0.17) — 노이즈 원인.
            // given vs user 구분은 voice/SFX로 충분 (cursor 이동 시 "given X" / "user X" 발화,
            // given에 입력 시도 시 SFX.given 낮은 buzz + "Cannot edit fixed cell")
          }
          // 빈 셀은 진짜 empty — center marker 제거 (v0.15의 노이즈 fix)
          // Cursor — blink 상태일 때만 frame 그림
          if (r === s.cursor.r && c === s.cursor.c && state.sudokuBlinkOn) {
            for (let dy = 0; dy < cellH; dy++) for (let dx = 0; dx < cellW; dx++) {
              const rr = drow + dy, cc = dcol + dx;
              if (cc < 0 || cc >= DP_W || rr < 0 || rr >= DP_H) continue;
              let mark = 0;
              if (dy === 0) mark |= 0x09;
              if (dy === cellH - 1) mark |= 0xC0;
              if (dx === 0) mark |= 0x47;
              if (dx === cellW - 1) mark |= 0xB8;
              cells[rr * DP_W + cc] |= mark;
            }
          }
        }
      }

      // 2) 세로 박스 divider — 첫 번째 cell만 (16번째 col 제거)
      // 패턴: 0xFF (full 8-dot, dots 1-8 모두 포함)
      // `|=` 사용 → 교차점에서 horizontal 0xE4와 OR 결합되어 0xFF 유지
      vDivs.forEach((divCol, idx) => {
        const dcol = ox + (divCol + 1) * cellW + idx * dt;
        for (let dy = 0; dy < totalH; dy++) {
          const drow = oy + dy;
          if (drow >= DP_H) continue;
          if (dcol < DP_W) cells[drow * DP_W + dcol] |= 0xFF;
        }
      });

      // 3) 가로 박스 divider — 첫 번째 row만 (6번째 row 제거)
      // 패턴: 0xE4 (dots 3+6+7+8)
      // `|=` 사용 → 교차점 (col 14, row 4)에서 vertical 0xFF와 OR → 0xFF (dots 1,2,4,5 살아남음)
      // 비교차 cells (row 4의 다른 cols): 0 | 0xE4 = 0xE4
      hDivs.forEach((divRow, idx) => {
        const drow = oy + (divRow + 1) * cellH + idx * dt;
        for (let dx = 0; dx < totalW; dx++) {
          const dcol = ox + dx;
          if (dcol >= DP_W) continue;
          if (drow < DP_H) cells[drow * DP_W + dcol] |= 0xE4;
        }
      });

      // 4) 셀 사이 boundary 제거 — 셀 구분은 빈 공간(centered digit padding)으로
    } else if (state.screen === 'minesweeper') {
      const s = state.minesweeper;
      const L = dpLayout(s.N, true);
      for (let r=0; r<s.N; r++) for (let c=0; c<s.N; c++) {
        const col = L.offsetX + c * L.cellW;
        const row = L.offsetY + r * L.cellH;
        if (s.revealed[r][c]) {
          const v = s.grid[r][c];
          if (v === -1) {
            // mine = solid block (all dots up)
            dpSetBlock(cells, col, row, L.cellW, L.cellH, 0xFF);
          } else if (v > 0) {
            // Number — 점자 숫자 (cellW ≥ 2면 prefix+letter, 아니면 dot count fallback)
            if (L.cellW >= 2 && BRL_NUM[v] !== undefined) {
              const padX = Math.floor((L.cellW - 2) / 2);
              const padY = Math.floor((L.cellH - 1) / 2);
              const mc = col + padX;
              const mr = row + padY;
              if (mc < DP_W && mr < DP_H) cells[mr * DP_W + mc] = BRL_NUM_PREFIX;
              if (mc + 1 < DP_W && mr < DP_H) cells[mr * DP_W + mc + 1] = BRL_NUM[v];
            } else {
              // Fallback: dot count
              const dots = Math.min(6, v);
              let pattern = 0;
              for (let i = 0; i < dots; i++) pattern |= (1 << i);
              dpSetBlock(cells, col, row, L.cellW, L.cellH, pattern);
            }
          }
          // safe revealed (v=0) → empty (no dots)
        } else if (s.flagged[r][c]) {
          // flag — X pattern (dots 2+5)
          dpSetBlock(cells, col, row, L.cellW, L.cellH, 0x12);
        } else {
          // hidden — dots 1+4 (top corners) so still feel-able
          dpSetBlock(cells, col, row, L.cellW, L.cellH, 0x09);
        }
        if (r === s.cursor.r && c === s.cursor.c) {
          // Cursor frame (outline 외각만)
          for (let dy = 0; dy < L.cellH; dy++) for (let dx = 0; dx < L.cellW; dx++) {
            const rr = row + dy, cc = col + dx;
            if (cc < 0 || cc >= DP_W || rr < 0 || rr >= DP_H) continue;
            let mark = 0;
            if (dy === 0) mark |= 0x09;
            if (dy === L.cellH - 1) mark |= 0xC0;
            if (dx === 0) mark |= 0x47;
            if (dx === L.cellW - 1) mark |= 0xB8;
            cells[rr * DP_W + cc] |= mark;
          }
        }
        // 셀 boundary 제거 — 셀 content 차이(hidden/flag/digit)로 구분
      }
    } else if (state.screen === 'nonogram') {
      const s = state.nonogram;
      const L = dpLayout(s.N, true);
      for (let r=0; r<s.N; r++) for (let c=0; c<s.N; c++) {
        const col = L.offsetX + c * L.cellW;
        const row = L.offsetY + r * L.cellH;
        if (s.state[r][c] === 1) {
          // filled = solid block (모든 dot up = 가장 강한 촉각)
          dpSetBlock(cells, col, row, L.cellW, L.cellH, 0xFF);
        } else if (s.state[r][c] === 2) {
          // X mark = 대각선 2개 dot
          dpSetBlock(cells, col, row, L.cellW, L.cellH, 0x12);
        }
        // empty = 0 (skip)
        if (r === s.cursor.r && c === s.cursor.c) {
          // 8-dot cursor frame (Sudoku/Minesweeper와 동일 패턴)
          for (let dy = 0; dy < L.cellH; dy++) for (let dx = 0; dx < L.cellW; dx++) {
            const rr = row + dy, cc = col + dx;
            if (cc < 0 || cc >= DP_W || rr < 0 || rr >= DP_H) continue;
            let mark = 0;
            if (dy === 0) mark |= 0x09;
            if (dy === L.cellH - 1) mark |= 0xC0;
            if (dx === 0) mark |= 0x47;
            if (dx === L.cellW - 1) mark |= 0xB8;
            cells[rr * DP_W + cc] |= mark;
          }
        }
      }
    } else if (state.screen === 'maze') {
      // Maze full-pad rendering (v0.22):
      //  - Fixed 2 × 2 braille cells per maze cell → fills all 10 dot-pad rows
      //    (5 visible maze rows × 2-cell tall = 10 rows; uses the bottom rows)
      //  - Walls become 2 braille cells thick on every side (solid 0xFF block)
      //  - Goal: hollow square (corners + center cross) — distinct from wall + ball
      //  - Player: large round ball with hollow corners; BLINKS (full ↔ blank)
      //    so a blind user can locate position in real time via the pulsing dots
      const s = state.maze;
      const cellW = 2, cellH = 2;
      const rowsShown = Math.floor(DP_H / cellH);          // 5
      const colsShown = Math.floor(DP_W / cellW);          // 15
      // Player-centered vertical viewport when maze taller than 5
      const startR = (s.N <= rowsShown)
        ? 0
        : Math.max(0, Math.min(s.N - rowsShown, s.player.r - Math.floor(rowsShown / 2)));
      // Horizontal: center if narrower than 15, else 0 (15×15 fits exactly)
      const totalW = cellW * Math.min(s.N, colsShown);
      const offsetX = Math.max(0, Math.floor((DP_W - totalW) / 2));
      const offsetY = (s.N <= rowsShown) ? Math.floor((DP_H - cellH * s.N) / 2) : 0;
      // Wall = 1-dot-thick perimeter outline of the 2×2 maze cell (4×8 dot grid).
      // Cell encoding for the 4-corner frame:
      //   TL: top row + left col = 0x4F
      //   TR: top row + right col = 0xB9
      //   BL: bottom row + left col = 0xC7
      //   BR: bottom row + right col = 0xF8
      const WALL = [[0x4F, 0xB9], [0xC7, 0xF8]];
      // Player = cross / plus shape (십자).
      // 2×2 braille cells = 4×8 dot grid; vertical bar fills middle 2 cols (rows
      // 0–7), horizontal bar fills middle 2 rows (cols 0–3) — overlapping at
      // the center to form a clean plus that's tactile-distinct from walls.
      //   . # # .
      //   . # # .
      //   . # # .
      //   # # # #     horizontal arm (row 3)
      //   # # # #     horizontal arm (row 4)
      //   . # # .
      //   . # # .
      //   . # # .
      const BALL = [[0xF8, 0xC7], [0xB9, 0x4F]];
      // Goal pattern — hollow square (top/bottom borders + side bars) so it
      // feels like a "frame" instead of a solid block
      //   # # # #   cell(0,0): dot 1+2+3+4 (top + left)        → 0x0F
      //   # . . #   cell(1,0): dot 1+2+3+8 (top + right side)
      // Simpler: top row dot1+4 borders; left/right col borders only.
      const GOAL = [
        [0x47, 0xB8],   // top: left col dots 1+2+3+7, right col dots 4+5+6+8
        [0x47, 0xB8],   // bottom: same — gives a vertical-bars frame
      ];
      for (let dy = 0; dy < rowsShown; dy++) {
        const r = startR + dy;
        if (r >= s.N) break;
        const row = offsetY + dy * cellH;
        for (let c = 0; c < Math.min(s.N, colsShown); c++) {
          const col = offsetX + c * cellW;
          if (s.grid[r][c] === 1) {
            // Wall = 1-dot-thick grid outline (frame around the 4×8 dot grid).
            // Adjacent walls naturally form a continuous grid lattice, while
            // isolated walls show as hollow rectangles — gives the maze a
            // "graph paper" feel instead of solid filled blocks.
            //   # # # #
            //   # . . #
            //   # . . #
            //   # . . #
            //   # . . #
            //   # . . #
            //   # . . #
            //   # # # #
            dpSetBlock(cells, col, row, cellW, cellH, WALL);
          }
          if (s.goal.r === r && s.goal.c === c) {
            dpSetBlock(cells, col, row, cellW, cellH, GOAL);
          }
          if (s.player.r === r && s.player.c === c) {
            // Blink: full ball when On, blank when Off — pulse at the player position
            if (state.mazeBlinkOn) {
              dpSetBlock(cells, col, row, cellW, cellH, BALL);
            }
            // else: empty (player position "disappears" briefly each blink cycle)
          }
        }
      }
    }
    return dpCellsToHex(cells);
  }

  // ============================================================
  // DOT PAD INPUT — key handling
  // ============================================================
  // ============================================================
  // CONTEXT HELP (F3+F4) — A.T. Guys 스타일
  // ============================================================
  function getContextHelp() {
    if (state.screen === 'launcher') {
      return 'DotPuzzle Pack main menu. F1 previous game. F2 next game. F3 to start. Pan left and right also work. Press difficulty chip on screen to change. Press F3 plus F4 for help. Press F1 plus F4 to return here from any screen.';
    }
    if (state.screen === 'sudoku') {
      const s = state.sudoku;
      if (s.N === 4) {
        return `Sudoku 4 by 4 Easy. Pan left and right move to previous and next cell, typewriter style. F1, F2, F3, F4 directly enter digits 1, 2, 3, 4. Pressing the same digit again clears the cell. Given cells cannot be edited; voice announces 'given' when you move to them and 'Cannot edit fixed cell' if you try to change them. F1 plus F2 reads current row. F2 plus F3 reads current column. F1 plus F3 reads the 2 by 2 box. F2 plus F4 checks the puzzle. F1 plus F4 home. F3 plus F4 help. Cursor blinks on Dot Pad to mark your position.`;
      }
      return `Sudoku ${s.N} by ${s.N}, difficulty ${DIFF_LABEL[state.difficulty.sudoku]}. F1 row up, F2 row down, pan left and right for columns. F3 cycles digit at cursor. F4 checks the puzzle. On screen, use Read row, What's missing, Check buttons. F1 plus F4 home. F3 plus F4 help.`;
    }
    if (state.screen === 'minesweeper') {
      const s = state.minesweeper;
      return `Minesweeper ${s.N} by ${s.N} with ${s.MINES} mines, difficulty ${DIFF_LABEL[state.difficulty.minesweeper]}. F1 row up, F2 row down, pan left and right for columns. F3 reveals current cell. F4 flags or unflags. Pan center reads board summary. First click is always safe. Invalid taps produce an error sound. Chain opens of safe areas are voiced with cell count. On screen use Safe hint and Read around for help. F1 plus F4 home. F3 plus F4 help.`;
    }
    if (state.screen === 'nonogram') {
      const s = state.nonogram;
      return `Nonogram ${s.N} by ${s.N}, difficulty ${DIFF_LABEL[state.difficulty.nonogram]}. On Dot Pad, filled cells are full 8-dot blocks, X marks are 2 dots middle. Cursor shows 4-edge frame. F1 row up, F2 row down, pan left and right for columns. F3 fills or empties. F4 marks X or clears. Completed rows and columns are announced automatically. On screen use Read hints and Progress. F1 plus F4 home. F3 plus F4 help.`;
    }
    if (state.screen === 'maze') {
      const s = state.maze;
      return `Maze ${s.N} by ${s.N}, difficulty ${DIFF_LABEL[state.difficulty.maze]}. On Dot Pad, walls feel solid (8 dots), player feels medium (4 dots in middle), goal feels light (2 dots). F1 move up, F2 move down, pan left for left, pan right for right. Pan all describes surroundings. On screen, Auto to fork advances to the next junction. F1 plus F4 home. F3 plus F4 help.`;
    }
    return 'DotPuzzle Pack. F1 plus F4 to return home. F3 plus F4 for help.';
  }

  function announceContextHelp() {
    const text = getContextHelp();
    if (state.ttsOn) { try { window.speechSynthesis.cancel(); } catch(e){} speak(text); }
    if (state.dotpadConnected && typeof brailleSetText === 'function') {
      // 점자 영역은 brailleSetText 없으니 displayTextData 직접 호출
      try {
        // 압축된 키 안내만 짧게 점자에
        const compact = state.screen === 'launcher'
          ? 'Menu F3 start F1/F2 nav'
          : state.screen + ' F3 sel F4 mark F1+F4 home';
        // No braille helper in this app yet — display via Dot Pad text line
        if (window.DotPad && window.DotPad.sdk && window.DotPad.sdk.displayTextData) {
          // Convert text to braille hex by simple ascii table (handled later if liblouis added)
          // For now, push the text via Dot Pad text area as raw text-mode bytes is non-trivial.
          // Skip braille — voice carries the help.
        }
      } catch(e){}
    }
    toast('Help · F1+F4 home, F3+F4 help', 3000);
  }

  function goHomeShortcut() {
    if (state.screen === 'launcher') {
      announceContextHelp(); // 이미 홈이면 help 발화
      return;
    }
    speak('Home.');
    goLauncher();
  }
  window.announceContextHelp = announceContextHelp;
  window.goHomeShortcut = goHomeShortcut;

  function onDotpadKey(device, keyCode, msg) {
    if (!window.DotPad) return;
    const KC = window.DotPad.KeyCodes;
    // 전역 콤보 키 — A.T. Guys 패턴
    if (keyCode === KC.KeyFunction34) { announceContextHelp(); return; }
    if (keyCode === KC.KeyFunction14) { goHomeShortcut(); return; }

    // Sudoku 4×4 전용 콤보 키 (long-press 대체)
    if (state.screen === 'sudoku' && state.sudoku && state.sudoku.N === 4) {
      if (keyCode === KC.KeyFunction12) { sudokuReadRow(); return; }
      if (keyCode === KC.KeyFunction23) { sudokuReadCol(); return; }
      if (keyCode === KC.KeyFunction13) { sudokuReadBox(); return; }
      if (keyCode === KC.KeyFunction24) { sudokuCheck(); return; }
    }

    if (state.screen === 'launcher') {
      // F1/F2 = navigate game cards · F3 = select
      const cards = Array.from(document.querySelectorAll('.game-card'));
      if (keyCode === KC.KeyFunction1) state.dotpadCursor = (state.dotpadCursor - 1 + cards.length) % cards.length;
      else if (keyCode === KC.KeyFunction2) state.dotpadCursor = (state.dotpadCursor + 1) % cards.length;
      else if (keyCode === KC.KeyFunction3) { cards[state.dotpadCursor]?.click(); return; }
      dotpadHighlight();
      speak(cards[state.dotpadCursor]?.querySelector('.game-card-title')?.textContent || '');
      return;
    }
    // Game screens
    if (keyCode === KC.PanningAll) {
      // Replay context
      if (state.screen === 'maze') return mazeDescribe();
      const p = document.querySelector('.game-sub')?.textContent || '';
      speak(p);
      return;
    }
    if (state.screen === 'sudoku') {
      const s = state.sudoku;
      if (s.N === 4) {
        // 4×4 전용 — F1-F4 = 숫자 1-4 직접 입력 (토글), Pan L/R = typewriter
        if (keyCode === KC.PanningLeft) { sudokuPrevCell(); return; }
        if (keyCode === KC.PanningRight) { sudokuNextCell(); return; }
        if (keyCode === KC.KeyFunction1) { sudokuInputN(1); return; }
        if (keyCode === KC.KeyFunction2) { sudokuInputN(2); return; }
        if (keyCode === KC.KeyFunction3) { sudokuInputN(3); return; }
        if (keyCode === KC.KeyFunction4) { sudokuInputN(4); return; }
        return;
      }
      // 6×6 / 9×9 기존 매핑 유지
      if (keyCode === KC.KeyFunction1) s.cursor.r = (s.cursor.r - 1 + s.N) % s.N;
      else if (keyCode === KC.KeyFunction2) s.cursor.r = (s.cursor.r + 1) % s.N;
      else if (keyCode === KC.PanningLeft) s.cursor.c = (s.cursor.c - 1 + s.N) % s.N;
      else if (keyCode === KC.PanningRight) s.cursor.c = (s.cursor.c + 1) % s.N;
      else if (keyCode === KC.KeyFunction3) {
        if (!s.given[s.cursor.r][s.cursor.c]) {
          s.grid[s.cursor.r][s.cursor.c] = (s.grid[s.cursor.r][s.cursor.c] + 1) % (s.N + 1);
        }
      } else if (keyCode === KC.KeyFunction4) {
        sudokuCheck(); return;
      }
      render();
      const cell_v = s.grid[s.cursor.r][s.cursor.c];
      speak('Row ' + (s.cursor.r+1) + ' col ' + (s.cursor.c+1) + ': ' + (cell_v || 'empty'));
    } else if (state.screen === 'minesweeper') {
      const s = state.minesweeper;
      if (keyCode === KC.KeyFunction1) s.cursor.r = (s.cursor.r - 1 + s.N) % s.N;
      else if (keyCode === KC.KeyFunction2) s.cursor.r = (s.cursor.r + 1) % s.N;
      else if (keyCode === KC.PanningLeft) s.cursor.c = (s.cursor.c - 1 + s.N) % s.N;
      else if (keyCode === KC.PanningRight) s.cursor.c = (s.cursor.c + 1) % s.N;
      else if (keyCode === KC.KeyFunction3) { msClick(s.cursor.r, s.cursor.c); return; }
      else if (keyCode === KC.KeyFunction4) { msFlag(s.cursor.r, s.cursor.c); return; }
      else if (keyCode === KC.PanningAll) {
        // Tier 1 standard: board summary (mines remaining, flags placed, % revealed)
        const flagsLeft = s.MINES - s.flagged.flat().filter(Boolean).length;
        const total = s.N * s.N;
        const revealed = s.revealed.flat().filter(Boolean).length;
        const pct = Math.round(revealed / (total - s.MINES) * 100);
        speak('Board: ' + s.MINES + ' mines, ' + flagsLeft + ' flags left, ' + pct + ' percent revealed.');
        return;
      }
      render();
      const v = s.grid[s.cursor.r][s.cursor.c];
      const status = s.revealed[s.cursor.r][s.cursor.c] ? (v === -1 ? 'mine' : v > 0 ? v + ' nearby' : 'empty') :
        s.flagged[s.cursor.r][s.cursor.c] ? 'flagged' : 'hidden';
      speak('Row ' + (s.cursor.r+1) + ' col ' + (s.cursor.c+1) + ': ' + status);
    } else if (state.screen === 'nonogram') {
      const s = state.nonogram;
      if (keyCode === KC.KeyFunction1) s.cursor.r = (s.cursor.r - 1 + s.N) % s.N;
      else if (keyCode === KC.KeyFunction2) s.cursor.r = (s.cursor.r + 1) % s.N;
      else if (keyCode === KC.PanningLeft) s.cursor.c = (s.cursor.c - 1 + s.N) % s.N;
      else if (keyCode === KC.PanningRight) s.cursor.c = (s.cursor.c + 1) % s.N;
      else if (keyCode === KC.KeyFunction3) { nonoClick(s.cursor.r, s.cursor.c); return; }
      else if (keyCode === KC.KeyFunction4) { nonoX(s.cursor.r, s.cursor.c); return; }
      render();
      const v = s.state[s.cursor.r][s.cursor.c];
      const status = v === 1 ? 'filled' : v === 2 ? 'x marked' : 'empty';
      const hint = 'Row hint ' + s.rowHints[s.cursor.r].join(' ') + '. Col hint ' + s.colHints[s.cursor.c].join(' ');
      speak('Row ' + (s.cursor.r+1) + ' col ' + (s.cursor.c+1) + ': ' + status + '. ' + hint);
    } else if (state.screen === 'maze') {
      if (keyCode === KC.KeyFunction1) mazeMove(-1, 0);
      else if (keyCode === KC.KeyFunction2) mazeMove(1, 0);
      else if (keyCode === KC.PanningLeft) mazeMove(0, -1);
      else if (keyCode === KC.PanningRight) mazeMove(0, 1);
    }
  }

  function dotpadHighlight() {
    document.querySelectorAll('.dotpad-focus').forEach(el => el.classList.remove('dotpad-focus'));
    if (state.screen === 'launcher') {
      const cards = document.querySelectorAll('.game-card');
      if (cards[state.dotpadCursor]) cards[state.dotpadCursor].classList.add('dotpad-focus');
    }
  }

  // ============================================================
  // DOT PAD CONNECT
  // ============================================================
  function dotpadAvailable() {
    if (window._dotpadLoadError) {
      alert('Dot Pad SDK failed to load: ' + window._dotpadLoadError);
      return false;
    }
    if (!(window.DotPad && window.DotPad.sdk)) {
      alert('Dot Pad SDK still loading — please wait a moment and try again.');
      return false;
    }
    return true;
  }
  function openDpOverlay() { $('dp-overlay').classList.add('active'); }
  function closeDpOverlay() { $('dp-overlay').classList.remove('active'); }

  async function connectBle() {
    if (!dotpadAvailable()) { alert('Dot Pad SDK not loaded'); return; }
    try {
      const device = await window.DotPad.scanner.startBleScan();
      if (!device) return;
      window.DotPad.sdk.setCallBack(onDotpadMessage, onDotpadKey);
      const connected = await window.DotPad.sdk.connectBleDevice(device);
      if (connected) {
        state.dotpadConnected = true;
        state.dotpadDevice = connected;
        state.dotpadName = device.name || 'Dot Pad';
        SFX.win();
        closeDpOverlay();
        speak('Dot Pad connected. F1 and F2 move cursor. F3 select. F4 toggle mark.');
        render();
      }
    } catch (e) {
      alert('BLE failed: ' + (e.message || e));
    }
  }

  async function connectUsb() {
    if (!dotpadAvailable()) { alert('Dot Pad SDK not loaded'); return; }
    try {
      const device = await window.DotPad.scanner.startUsbScan();
      if (!device) return;
      window.DotPad.sdk.setCallBack(onDotpadMessage, onDotpadKey);
      const connected = await window.DotPad.sdk.connectUsbDevice(device);
      if (connected) {
        state.dotpadConnected = true;
        state.dotpadDevice = connected;
        state.dotpadName = 'USB Dot Pad';
        SFX.win();
        closeDpOverlay();
        speak('Dot Pad connected. F1 and F2 move cursor. F3 select. F4 toggle mark.');
        render();
      }
    } catch (e) {
      alert('USB failed: ' + (e.message || e));
    }
  }

  function onDotpadMessage(device, code, msg) {
    if (!window.DotPad) return;
    const DC = window.DotPad.DataCodes || {};
    if (code === DC.Connected) {
      state.dotpadConnected = true;
      render();
    } else if (code === DC.Disconnected) {
      state.dotpadConnected = false;
      render();
    }
  }

  // ============================================================
  // KEYBOARD SHORTCUTS (desktop testing)
  // ============================================================
  document.addEventListener('keydown', (e) => {
    // 전역 단축키 (인풋 제외)
    if (!e.target.matches('input, textarea')) {
      if (e.key === '?' || e.key === 'h' || e.key === 'H') {
        e.preventDefault();
        announceContextHelp();
        return;
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        goHomeShortcut();
        return;
      }
    }
    if (state.screen === 'maze' && !e.target.matches('input, textarea')) {
      if (e.key === 'ArrowUp') { e.preventDefault(); mazeMove(-1, 0); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); mazeMove(1, 0); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); mazeMove(0, -1); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); mazeMove(0, 1); }
    } else if (state.screen === 'sudoku' && !e.target.matches('input, textarea')) {
      const s = state.sudoku;
      if (e.key === 'ArrowUp') { e.preventDefault(); s.cursor.r = (s.cursor.r - 1 + s.N) % s.N; render(); SFX.move(); sudokuAnnounceCursor(); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); s.cursor.r = (s.cursor.r + 1) % s.N; render(); SFX.move(); sudokuAnnounceCursor(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault();
        if (s.N === 4) sudokuPrevCell();
        else { s.cursor.c = (s.cursor.c - 1 + s.N) % s.N; render(); SFX.move(); }
      }
      else if (e.key === 'ArrowRight') { e.preventDefault();
        if (s.N === 4) sudokuNextCell();
        else { s.cursor.c = (s.cursor.c + 1) % s.N; render(); SFX.move(); }
      }
      else if (/^[0-9]$/.test(e.key)) {
        const n = parseInt(e.key);
        if (n > 0 && n <= s.N) {
          if (s.N === 4) sudokuInputN(n); // 4×4 toggle
          else sudokuInput(n);
        } else if (n === 0) sudokuInput(0);
      }
    } else if ((state.screen === 'minesweeper' || state.screen === 'nonogram') && !e.target.matches('input, textarea')) {
      const s = state.screen === 'minesweeper' ? state.minesweeper : state.nonogram;
      if (e.key === 'ArrowUp') { e.preventDefault(); s.cursor.r = (s.cursor.r - 1 + s.N) % s.N; render(); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); s.cursor.r = (s.cursor.r + 1) % s.N; render(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); s.cursor.c = (s.cursor.c - 1 + s.N) % s.N; render(); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); s.cursor.c = (s.cursor.c + 1) % s.N; render(); }
      else if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        if (state.screen === 'minesweeper') msClick(s.cursor.r, s.cursor.c);
        else nonoClick(s.cursor.r, s.cursor.c);
      } else if (e.key === 'f' || e.key === 'F') {
        if (state.screen === 'minesweeper') msFlag(s.cursor.r, s.cursor.c);
        else nonoX(s.cursor.r, s.cursor.c);
      }
    }
  });

  // ============================================================
  // BOOT
  // ============================================================
  // expose for inline onclick handlers
  window.startGame = startGame;
  window.goLauncher = goLauncher;
  window.toggleTts = toggleTts;
  window.openDpOverlay = openDpOverlay;
  window.closeDpOverlay = closeDpOverlay;
  window.connectBle = connectBle;
  window.connectUsb = connectUsb;
  window.sudokuClick = sudokuClick;
  window.sudokuInput = sudokuInput;
  window.sudokuCheck = sudokuCheck;
  window.sudokuReset = sudokuReset;
  window.msClick = msClick;
  window.msFlag = msFlag;
  window.nonoClick = nonoClick;
  window.nonoX = nonoX;
  window.nonoCheck = nonoCheck;
  window.mazeMove = mazeMove;
  window.mazeDescribe = mazeDescribe;
  window.initMinesweeper = initMinesweeper;
  window.initMaze = initMaze;
  window.initNonogram = initNonogram;
  window.state = state;

  // DotArcade 딥링크: ?game=sudoku|minesweeper|nonogram|maze 로 해당 퍼즐에 바로 진입
  // (iframe SDK가 특정 퍼즐을 지정해 임베드할 때 사용)
  (function dotArcadeDeepLink() {
    try {
      const g = new URLSearchParams(location.search).get('game');
      const valid = ['sudoku', 'minesweeper', 'nonogram', 'maze'];
      if (g && valid.includes(g)) { startGame(g); return; }
    } catch (e) {}
    render();
  })();
  </script>
</body>
